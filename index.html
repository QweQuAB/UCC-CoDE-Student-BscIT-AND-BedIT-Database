<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UCC CoDE — BSc IT &amp; BEd IT Student Database</title>

  <!-- Firebase SDK (v9 compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

  <!-- React 18 -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <!-- Babel (JSX in browser) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- SheetJS (Excel export) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy:  #0d1b2a;
      --teal:  #1b6ca8;
      --gold:  #f0a500;
      --light: #f4f7fb;
      --white: #ffffff;
      --border:#dde3ec;
      --text:  #1a2332;
      --sub:   #5a6a7e;
      --green: #27ae60;
      --red:   #c0392b;
    }
    body { font-family: 'Georgia','Times New Roman',serif; background: var(--light); color: var(--text); min-height: 100vh; }
    button { cursor: pointer; }
    input, select, textarea { font-family: inherit; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--light); }
    ::-webkit-scrollbar-thumb { background: #c8d4e3; border-radius: 3px; }
    /* ── LAYOUT ── */
    #root { display: flex; flex-direction: column; min-height: 100vh; }
    .hdr { background: var(--navy); position: sticky; top: 0; z-index: 100; }
    .hdr-inner { max-width: 1400px; margin: 0 auto; padding: 13px 24px; display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
    .stripe { height: 3px; background: linear-gradient(90deg,var(--gold),var(--teal)); }
    .logo { display: flex; align-items: center; gap: 12px; }
    .logo-mk { background: var(--gold); color: var(--navy); font-weight: 900; font-size: 12px; padding: 5px 8px; border-radius: 4px; letter-spacing: 1px; }
    .logo-title { color: #fff; font-weight: 700; font-size: 15px; line-height: 1.2; }
    .logo-sub { color: #8899bb; font-size: 11px; font-family: Arial,sans-serif; }
    nav { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
    .nav-btn { background: transparent; border: 1px solid #ffffff22; color: #ccd; padding: 7px 15px; border-radius: 6px; font-size: 13px; font-family: Georgia,serif; transition: all .15s; }
    .nav-btn:hover { border-color: #ffffff44; background: #ffffff11; }
    .nav-btn.on { background: var(--teal); color: #fff; border-color: var(--teal); }
    .logout-btn { background: transparent; border: 1px solid #c0392b55; color: #e77; padding: 7px 12px; border-radius: 6px; font-size: 12px; font-family: Georgia,serif; }
    main { max-width: 1400px; margin: 0 auto; padding: 32px 24px; flex: 1; width: 100%; }
    footer { text-align: center; padding: 22px; color: #aaa; font-size: 12px; font-family: Arial,sans-serif; border-top: 1px solid var(--border); margin-top: 40px; }
    /* ── TYPOGRAPHY ── */
    h1 { font-size: 24px; color: var(--navy); font-weight: 700; }
    .lead { color: var(--sub); font-size: 13px; font-family: Arial,sans-serif; margin-top: 6px; }
    /* ── CONTROLS ── */
    .filter-bar { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
    .search-wrap { flex: 1; min-width: 180px; display: flex; align-items: center; gap: 8px; background: var(--white); border: 1px solid var(--border); border-radius: 8px; padding: 0 12px; color: var(--sub); }
    .search-wrap svg { flex-shrink: 0; }
    .search-input { flex: 1; border: none; outline: none; padding: 9px 0; font-size: 14px; background: transparent; font-family: Georgia,serif; color: var(--text); }
    .x-small { background: none; border: none; font-size: 15px; color: var(--sub); padding: 0 2px; }
    select.sel { padding: 9px 13px; border: 1px solid var(--border); border-radius: 8px; background: var(--white); font-size: 13px; color: var(--text); font-family: Georgia,serif; }
    /* ── BUTTONS ── */
    .btn-print  { background: #fff; border: 1px solid var(--border); color: var(--text); padding: 9px 16px; border-radius: 8px; font-size: 13px; display: inline-flex; align-items: center; gap: 7px; font-family: Georgia,serif; }
    .btn-excel  { background: #e8f7ee; border: 1px solid #b7dfc6; color: #217346; padding: 9px 16px; border-radius: 8px; font-size: 13px; display: inline-flex; align-items: center; gap: 7px; font-family: Georgia,serif; }
    .btn-import { background: #fff7e6; border: 1px solid #f5cfa0; color: #b7680a; padding: 9px 16px; border-radius: 8px; font-size: 13px; display: inline-flex; align-items: center; gap: 7px; font-family: Georgia,serif; }
    .btn-seed{background:#a78bfa;color:#fff;border:none;padding:9px 14px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;}
.btn-seed:hover{background:#7c3aed;}
.btn-add    { background: var(--gold); color: var(--navy); border: none; padding: 9px 18px; border-radius: 8px; font-weight: 700; font-size: 13px; display: inline-flex; align-items: center; gap: 7px; font-family: Georgia,serif; }
    .btn-save   { background: var(--teal); color: #fff; border: none; padding: 10px 22px; border-radius: 7px; font-size: 14px; font-weight: 600; font-family: Georgia,serif; }
    .btn-cancel { background: var(--light); border: 1px solid var(--border); padding: 9px 18px; border-radius: 7px; font-size: 14px; font-family: Georgia,serif; color: var(--text); }
    .btn-edit   { background: #e8f4fd; border: none; color: var(--teal); padding: 6px 8px; border-radius: 6px; }
    .btn-del    { background: #fdeaea; border: none; color: var(--red); padding: 6px 8px; border-radius: 6px; }
    /* ── TABLE ── */
    .tbl-wrap { overflow-x: auto; background: var(--white); border-radius: 10px; border: 1px solid var(--border); margin-bottom: 20px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; font-family: Arial,sans-serif; }
    thead tr { background: var(--navy); }
    th { color: #fff; padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 600; letter-spacing: .5px; white-space: nowrap; }
    td { padding: 9px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr.even td { background: #f9fbfd; }
    .grp-badge { background: #e8f4fd; color: var(--teal); padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; white-space: nowrap; }
    .grp-hdr td { background: #f0f4fa; color: var(--navy); font-weight: 700; font-size: 12px; letter-spacing: .5px; }
    .dash { color: #bbb; }
    /* ── CARDS ── */
    .card-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(320px,1fr)); gap: 12px; }
    .card { background: var(--white); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    .card-hdr { display: flex; align-items: center; gap: 13px; padding: 15px 17px; cursor: pointer; }
    .avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg,var(--teal),var(--navy)); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; flex-shrink: 0; }
    .card-name { font-weight: 700; font-size: 15px; }
    .card-sub  { color: var(--sub); font-size: 12px; font-family: Arial,sans-serif; margin-top: 2px; }
    .card-body { padding: 0 17px 15px; border-top: 1px solid var(--border); }
    .chip { margin: 10px 0 0; background: var(--light); border-radius: 7px; padding: 9px 12px; }
    .chip-top { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 4px; }
    .chip-course { font-weight: 700; font-size: 13px; color: var(--navy); }
    .chip-code { font-size: 10px; color: var(--sub); }
    .chip-grp { background: var(--teal); color: #fff; font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 700; margin-left: auto; }
    .chip-topic { font-size: 12px; color: #444; font-style: italic; font-family: Arial,sans-serif; }
    /* ── COURSE TABS ── */
    .course-tabs-wrap { overflow-x: auto; margin-bottom: 20px; }
    .course-tabs { display: flex; gap: 4px; min-width: max-content; }
    .c-tab { background: var(--white); border: 1px solid var(--border); padding: 10px 16px; border-radius: 8px; font-size: 13px; color: var(--sub); font-family: Georgia,serif; display: flex; flex-direction: column; align-items: flex-start; gap: 2px; }
    .c-tab.on { background: var(--navy); color: #fff; border-color: var(--navy); }
    .c-tab-code { font-size: 10px; opacity: .7; }
    .badge { background: var(--light); color: var(--sub); font-size: 10px; padding: 1px 6px; border-radius: 10px; font-family: Arial,sans-serif; font-weight: 700; }
    .c-tab.on .badge { background: rgba(255,255,255,.2); color: #fff; }
    /* ── MODAL ── */
    .overlay { position: fixed; inset: 0; background: #00000066; display: flex; align-items: center; justify-content: center; z-index: 999; padding: 20px; }
    .modal { background: var(--white); border-radius: 12px; width: 100%; max-width: 640px; max-height: 90vh; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 20px 60px #00000044; }
    .modal-head { padding: 17px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .modal-title { font-weight: 700; font-size: 16px; color: var(--navy); }
    .x-btn { background: none; border: none; font-size: 18px; color: var(--sub); }
    .m-tabs { display: flex; border-bottom: 1px solid var(--border); padding: 0 24px; }
    .m-tab { background: none; border: none; padding: 12px 18px; font-size: 13px; color: var(--sub); font-family: Georgia,serif; border-bottom: 2px solid transparent; }
    .m-tab.on { color: var(--teal); border-bottom: 2px solid var(--teal); font-weight: 600; }
    .modal-body { padding: 24px; overflow-y: auto; flex: 1; }
    .modal-foot { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; }
    /* ── FORMS ── */
    .form-stack { display: flex; flex-direction: column; gap: 10px; }
    label.lbl { font-weight: 600; font-size: 13px; color: var(--navy); font-family: Arial,sans-serif; }
    .inp { padding: 10px 12px; border: 1px solid var(--border); border-radius: 7px; font-size: 14px; outline: none; font-family: Georgia,serif; color: var(--text); width: 100%; }
    .inp:focus { border-color: var(--teal); }
    .sm-inp { font-size: 13px; padding: 7px 10px; }
    .c-row { border-bottom: 1px solid var(--border); padding-bottom: 14px; margin-bottom: 14px; }
    .c-label { font-size: 13px; color: var(--navy); margin-bottom: 8px; font-family: Arial,sans-serif; }
    .c-fields { display: flex; gap: 12px; flex-wrap: wrap; }
    .f-tag { display: block; font-size: 10px; color: var(--sub); margin-bottom: 4px; font-family: Arial,sans-serif; text-transform: uppercase; }
    /* ── LOGIN ── */
    .login-wrap { display: flex; justify-content: center; padding-top: 80px; }
    .login-card { background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 40px 36px; width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 14px; }
    /* ── MISC ── */
    .empty { text-align: center; padding: 60px 20px; color: var(--sub); font-size: 15px; font-family: Arial,sans-serif; }
    .stat  { color: var(--sub); font-size: 13px; font-family: Arial,sans-serif; margin-bottom: 14px; }
    .err   { color: var(--red); font-size: 12px; text-align: center; font-family: Arial,sans-serif; }
    .admin-top { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
    .admin-btns { display: flex; gap: 8px; flex-wrap: wrap; }
    .cv-controls { display: flex; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; }
    .saving-toast { position: fixed; bottom: 20px; right: 20px; background: var(--navy); color: #fff; padding: 10px 18px; border-radius: 8px; font-size: 13px; font-family: Arial,sans-serif; z-index: 9999; box-shadow: 0 4px 20px #00000033; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #ffffff44; border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    /* CONFIG NOTICE */
    .config-notice { background: #fff3cd; border: 1px solid #ffc107; border-radius: 10px; padding: 20px 24px; margin-bottom: 24px; font-family: Arial,sans-serif; }
    .config-notice h3 { color: #856404; margin-bottom: 8px; }
    .config-notice p  { color: #664d03; font-size: 13px; line-height: 1.6; }
    .config-notice code { background: #fff; border: 1px solid #ffc107; border-radius: 3px; padding: 1px 5px; font-size: 12px; }
    @media (max-width: 600px) {
      main { padding: 20px 16px; }
      .hdr-inner { padding: 10px 16px; }
      .logo-title { font-size: 13px; }
      h1 { font-size: 20px; }
    }

    /* ── ADMIN INNER TABS ── */
    .admin-inner-tabs{display:flex;gap:0;margin-bottom:28px;border-bottom:2px solid var(--border);flex-wrap:wrap;}
    .ai-tab{background:none;border:none;padding:11px 20px;font-size:13px;color:var(--sub);font-family:Georgia,serif;border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:color .15s;}
    .ai-tab:hover{color:var(--teal);}
    .ai-tab.on{color:var(--teal);border-bottom-color:var(--teal);font-weight:700;}
    /* ── DASHBOARD ── */
    .stat-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:14px;margin-bottom:28px;}
    .stat-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:22px 20px;position:relative;overflow:hidden;}
    .stat-card::before{content:"";position:absolute;top:0;left:0;width:4px;height:100%;background:var(--teal);}
    .stat-card.s-gold::before{background:var(--gold);}
    .stat-card.s-green::before{background:var(--green);}
    .stat-card.s-purple::before{background:#a78bfa;}
    .stat-card.s-red::before{background:var(--red);}
    .stat-num{font-size:38px;font-weight:900;color:var(--navy);line-height:1;margin-bottom:6px;font-family:Arial,sans-serif;}
    .stat-label{font-size:11px;color:var(--sub);font-family:Arial,sans-serif;text-transform:uppercase;letter-spacing:.5px;}
    .dash-section{margin-bottom:28px;}
    .dash-section h3{font-size:12px;color:var(--sub);text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px;font-family:Arial,sans-serif;font-weight:700;border-bottom:1px solid var(--border);padding-bottom:8px;}
    .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px;font-family:Arial,sans-serif;font-size:12px;}
    .bar-label{width:130px;flex-shrink:0;color:var(--text);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .bar-track{flex:1;height:10px;background:var(--light);border-radius:5px;overflow:hidden;}
    .bar-fill{height:100%;background:var(--teal);border-radius:5px;transition:width .4s;min-width:2px;}
    .bar-fill.alt{background:var(--gold);}
    .bar-val{width:55px;text-align:right;color:var(--sub);flex-shrink:0;}
    .bar-extra{width:65px;color:var(--sub);opacity:.7;flex-shrink:0;font-size:11px;}
    /* ── GROUPS MANAGER ── */
    .groups-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:12px;}
    .groups-meta{display:flex;gap:18px;margin-bottom:14px;font-family:Arial,sans-serif;font-size:12px;color:var(--sub);}
    .meta-pill{padding:3px 10px;border-radius:12px;background:var(--light);font-weight:700;}
    .meta-pill.warn{background:#fff3cd;color:#856404;}
    .meta-pill.bad{background:#fdeaea;color:var(--red);}
    .groups-list{display:flex;flex-direction:column;gap:8px;}
    .group-row{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:14px 18px;}
    .group-row-top{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
    .group-num-badge{background:var(--navy);color:#fff;padding:4px 12px;border-radius:6px;font-size:12px;font-weight:700;white-space:nowrap;font-family:Arial,sans-serif;min-width:70px;text-align:center;}
    .group-topic-area{flex:1;min-width:180px;}
    .topic-view-row{display:flex;align-items:center;gap:8px;cursor:pointer;padding:5px 9px;border-radius:6px;border:1px solid transparent;transition:all .12s;}
    .topic-view-row:hover{background:var(--light);border-color:var(--border);}
    .g-topic{font-size:14px;color:var(--text);font-family:Georgia,serif;}
    .no-topic{color:#bbb;font-size:13px;font-style:italic;}
    .edit-hint{font-size:12px;opacity:.4;margin-left:auto;}
    .topic-edit-row{display:flex;align-items:center;gap:8px;}
    .btn-sm{padding:6px 14px;border-radius:6px;font-size:12px;font-family:Arial,sans-serif;border:none;cursor:pointer;font-weight:600;}
    .btn-sm.s{background:var(--teal);color:#fff;}
    .btn-sm.c{background:var(--light);border:1px solid var(--border);color:var(--text);}
    .group-cnt{color:var(--sub);font-size:12px;font-family:Arial,sans-serif;white-space:nowrap;margin-left:auto;}
    .toggle-members{background:none;border:1px solid var(--border);color:var(--sub);font-size:11px;padding:3px 9px;border-radius:5px;font-family:Arial,sans-serif;margin-top:10px;}
    .member-list{list-style:none;padding:10px 0 0;display:flex;flex-direction:column;gap:4px;}
    .member-list li{display:flex;justify-content:space-between;align-items:center;font-size:12px;font-family:Arial,sans-serif;padding:4px 8px;background:var(--light);border-radius:5px;}
    .m-idx{color:var(--sub);font-size:11px;}
    /* ── WIZARD ── */
    .wizard-tools{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px;margin-top:18px;}
    .wizard-tool{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:24px 20px;cursor:pointer;transition:all .15s;text-align:center;}
    .wizard-tool:hover{border-color:var(--teal);box-shadow:0 4px 16px #1b6ca822;transform:translateY(-2px);}
    .tool-icon{font-size:32px;margin-bottom:10px;}
    .tool-title{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:6px;}
    .tool-desc{font-size:12px;color:var(--sub);font-family:Arial,sans-serif;line-height:1.5;}
    .wiz-shell{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
    .wiz-hdr{background:var(--navy);padding:16px 22px;display:flex;align-items:center;justify-content:space-between;}
    .wiz-title{color:#fff;font-size:15px;font-weight:700;}
    .wiz-back{background:transparent;border:1px solid #ffffff44;color:#ccd;padding:6px 13px;border-radius:6px;font-size:12px;font-family:Arial,sans-serif;}
    .wiz-body{padding:24px;}
    .step-bar{display:flex;gap:6px;margin-bottom:22px;align-items:center;}
    .s-dot{width:26px;height:26px;border-radius:50%;background:var(--light);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--sub);font-family:Arial,sans-serif;flex-shrink:0;}
    .s-dot.done{background:var(--green);border-color:var(--green);color:#fff;}
    .s-dot.active{background:var(--teal);border-color:var(--teal);color:#fff;}
    .s-line{flex:1;height:2px;background:var(--border);}
    .s-line.done{background:var(--green);}
    .pick-list{display:flex;flex-direction:column;gap:5px;max-height:280px;overflow-y:auto;margin-top:10px;padding-right:4px;}
    .pick-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border:1px solid var(--border);border-radius:8px;cursor:pointer;font-size:13px;font-family:Arial,sans-serif;transition:background .1s;background:var(--white);}
    .pick-item:hover{background:var(--light);}
    .pick-item.sel{background:#e8f4fd;border-color:var(--teal);}
    .pick-name{font-weight:600;flex:1;}
    .pick-idx{color:var(--sub);font-size:11px;}
    .wiz-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border);}
    .btn-next{background:var(--teal);color:#fff;border:none;padding:10px 24px;border-radius:8px;font-size:14px;font-weight:600;font-family:Georgia,serif;}
    .btn-next:disabled{opacity:.4;cursor:not-allowed;}
    .success-box{text-align:center;padding:40px 20px;}
    .s-icon{font-size:56px;margin-bottom:14px;}
    .s-msg{font-size:18px;font-weight:700;color:var(--green);margin-bottom:8px;}
    .s-sub{color:var(--sub);font-size:13px;font-family:Arial,sans-serif;}
    .bulk-topic-grid{display:flex;flex-direction:column;gap:8px;max-height:400px;overflow-y:auto;margin-top:12px;}
    .bt-row{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--white);border:1px solid var(--border);border-radius:8px;}
    .bt-grp{background:var(--navy);color:#fff;padding:3px 10px;border-radius:5px;font-size:11px;font-weight:700;min-width:65px;text-align:center;font-family:Arial,sans-serif;}
    .bt-inp{flex:1;padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:Georgia,serif;outline:none;}

    .rep-wa{background:#25d366;color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;text-decoration:none;display:inline-block;margin-top:4px;font-family:Arial,sans-serif;}

    .card-contacts{display:flex;gap:8px;flex-wrap:wrap;padding:8px 17px 0;}

function printTable(html, title) {
  const w = window.open("","_blank","width=900,height=700");
  if (!w) { alert("Please allow pop-ups to use Print / PDF."); return; }
  w.document.write(`<!DOCTYPE html><html><head><title>${title}</title><style>
    *{box-sizing:border-box;margin:0;padding:0} body{font-family:'Times New Roman',serif;padding:32px;color:#111}
    h1{font-size:18px;margin-bottom:4px} .sub{font-size:12px;color:#555;margin-bottom:20px}
    table{width:100%;border-collapse:collapse;font-size:13px} thead tr{background:#0d1b2a;color:#fff}
    th{padding:9px 12px;text-align:left;font-size:12px;letter-spacing:.5px} td{padding:8px 12px;border-bottom:1px solid #ddd}

    .gh td{background:#f0f4fa;font-weight:700;font-size:12px;color:#0d1b2a;letter-spacing:.5px}
    .foot{margin-top:24px;font-size:11px;color:#888} @media print{body{padding:16px}}
  </style></head><body>

  setTimeout(()=>{w.focus();w.print();},500);
}

function buildPrintHTML(students, courseKey, groupFilter) {
  const course = COURSES.find(c=>c.key===courseKey);
  const sorted = [...students]
    .filter(s=>{ const c=s.courses?.[courseKey]; if(!c?.group)return false; if(groupFilter&&groupFilter!=="all"&&c.group!==groupFilter)return false; return true; })
    .sort((a,b)=>{ const ga=a.courses[courseKey]?.group||"",gb=b.courses[courseKey]?.group||""; return ga!==gb?ga.localeCompare(gb,undefined,{numeric:true}):a.name.localeCompare(b.name); });
  const byGrp={};
  sorted.forEach(s=>{ const g=s.courses[courseKey].group; if(!byGrp[g])byGrp[g]=[]; byGrp[g].push(s); });
  let rows="",n=0;
  Object.entries(byGrp).forEach(([g,list])=>{
    if(groupFilter==="all") rows+=`<tr class="gh"><td colspan="6">Group ${g}</td></tr>`;
    list.forEach(s=>{ n++; rows+=`<tr><td>${n}</td><td>${s.name}</td><td>${s.indexNumber||"—"}</td><td>${s.program||"—"}</td><td><span class="g">Group ${s.courses[courseKey].group}</span></td><td>${s.courses[courseKey].topic||"—"}</td></tr>`; });
  });
  const gLabel = groupFilter&&groupFilter!=="all"?` — Group ${groupFilter}`:"";
  return { title:`${course.label} (${course.code})${gLabel}`, html:`<table><thead><tr><th>#</th><th>Full Name</th><th>Index No.</th><th>Programme</th><th>Group</th><th>Research Topic</th></tr></thead><tbody>${rows}</tbody></table>` };
}

    .filter(s=>{ const c=s.courses?.[courseKey]; if(!c?.group)return false; if(groupFilter&&groupFilter!=="all"&&c.group!==groupFilter)return false; return true; })
    .sort((a,b)=>{ const ga=a.courses[courseKey]?.group||"",gb=b.courses[courseKey]?.group||""; return ga!==gb?ga.localeCompare(gb,undefined,{numeric:true}):a.name.localeCompare(b.name); })
    .map((s,i)=>({"#":i+1,"Full Name":s.name,"Index Number":s.indexNumber||"","Programme":s.program||"","Group":s.courses[courseKey]?.group||"","Research Topic":s.courses[courseKey]?.topic||""}));
  const ws=XLSX.utils.json_to_sheet(rows);
  ws["!cols"]=[{wch:4},{wch:28},{wch:20},{wch:28},{wch:8},{wch:40}];
  const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,course.label.slice(0,31));
  const suf=groupFilter&&groupFilter!=="all"?`_Grp${groupFilter}`:"";
  XLSX.writeFile(wb,`UCC_CoDE_${course.code.replace(/\//g,"-")}${suf}.xlsx`);
}

function exportAllXLSX(students) {
  const wb=XLSX.utils.book_new();
  const master=students.map((s,i)=>{ const r={"#":i+1,"Full Name":s.name,"Index Number":s.indexNumber||"","Programme":s.program||""}; COURSES.forEach(c=>{r[`${c.code} Group`]=s.courses?.[c.key]?.group||"";r[`${c.code} Topic`]=s.courses?.[c.key]?.topic||"";}); return r; });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(master),"All Students");
  COURSES.forEach(c=>{ const rows=[...students].filter(s=>s.courses?.[c.key]?.group).sort((a,b)=>a.courses[c.key].group.localeCompare(b.courses[c.key].group,undefined,{numeric:true})||a.name.localeCompare(b.name)).map((s,i)=>({"#":i+1,"Full Name":s.name,"Index Number":s.indexNumber||"","Programme":s.program||"","Group":s.courses[c.key]?.group||"","Research Topic":s.courses[c.key]?.topic||""})); if(rows.length)XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(rows),c.label.slice(0,31)); });
  XLSX.writeFile(wb,"UCC_CoDE_StudentDatabase.xlsx");
}

// APP CONFIG HOOK — editable courses, programs, WhatsApp links
// ─────────────────────────────────────────────────────────────────────────────
function useAppConfig() {
  const DEFAULTS = {
    courses: COURSES.map(c=>({...c})),
    programs: [...PROGRAMS],
    whatsapp: {groups:{}, programs:{}, centers:{}}
  };
  const [cfg, setCfg] = useState(()=>{
    try { const s=localStorage.getItem("app_cfg"); return s?{...DEFAULTS,...JSON.parse(s)}:DEFAULTS; }
    catch { return DEFAULTS; }
  });
  useEffect(()=>{
    if(window.db) window.db.collection("_config").doc("app").get()
      .then(doc=>{ if(doc.exists) setCfg(prev=>({...DEFAULTS,...doc.data()})); }).catch(()=>{});
  },[]);
  const saveCfg = (updates) => {
    const merged = {...cfg, ...updates};
    setCfg(merged);
    localStorage.setItem("app_cfg", JSON.stringify(merged));
    if(window.db) window.db.collection("_config").doc("app").set(merged).catch(()=>{});
  };
  return {cfg, saveCfg};
}

// FIREBASE DATABASE LAYER
// ─────────────────────────────────────────────────────────────────────────────
function useStudents() {
  const [students,  setStudents]  = useState([]);
  const [loading,   setLoading]   = useState(true);
  const [saving,    setSaving]    = useState(false);
  const [dbMode,    setDbMode]    = useState("local"); // "firebase" | "local"

  useEffect(()=>{
    if(window.firebaseReady && window.db) {
      setDbMode("firebase");
      // Real-time listener
      const unsub = window.db.collection("students").onSnapshot(
        snap => {
          const docs = snap.docs.map(d=>({...d.data(), _docId:d.id}));
          setStudents(docs);
          setLoading(false);
        },
        err => {
          console.error("Firestore error:", err);
          // Fallback to local
          setStudents(lsGet());
          setLoading(false);
          setDbMode("local");
        }
      );
      return ()=>unsub();
    } else {
      setStudents(lsGet());
      setLoading(false);
    }
  },[]);

  const saveStudent = useCallback(async (student) => {
    setSaving(true);
    try {
      if(dbMode==="firebase" && window.db) {
        const {_docId,...data} = student;
        // Use student.id as document ID for consistent lookup
        await window.db.collection("students").doc(student.id).set(data);
        // Snapshot listener will update state automatically
      } else {
        setStudents(prev=>{
          const idx=prev.findIndex(x=>x.id===student.id);
          const next = idx>=0 ? [...prev.slice(0,idx),student,...prev.slice(idx+1)] : [...prev,student];
          lsSet(next); return next;
        });
      }
    } finally { setSaving(false); }
  }, [dbMode]);

  const deleteStudent = useCallback(async (id) => {
    setSaving(true);
    try {
      if(dbMode==="firebase" && window.db) {
        await window.db.collection("students").doc(id).delete();
      } else {
        setStudents(prev=>{ const next=prev.filter(s=>s.id!==id); lsSet(next); return next; });
      }
    } finally { setSaving(false); }
  }, [dbMode]);

  const importStudents = useCallback(async (list) => {
    if(!window.confirm(`Add ${list.length} students to the database?`)) return;
    setSaving(true);
    try {
      if(dbMode==="firebase" && window.db) {
        const batch = window.db.batch();
        list.forEach(s=>{ const ref=window.db.collection("students").doc(s.id); batch.set(ref,s); });
        await batch.commit();
      } else {
        setStudents(prev=>{ const next=[...prev,...list]; lsSet(next); return next; });
      }
    } finally { setSaving(false); }
  }, [dbMode]);


  const saveGroupTopic = useCallback(async (courseKey, groupNum, newTopic) => {
    const affected = students.filter(s => String(s.courses[courseKey]?.group) === String(groupNum));
    if (!affected.length) return;
    setSaving(true);
    try {
      const updater = s => ({...s, courses:{...s.courses,[courseKey]:{...s.courses[courseKey],topic:newTopic}}});
      if (dbMode==="firebase" && window.db) {
        for (let i=0;i<affected.length;i+=400) {
          const batch=window.db.batch();
          affected.slice(i,i+400).forEach(s=>batch.set(window.db.collection("students").doc(s.id),updater(s)));
          await batch.commit();
        }
      } else {
        setStudents(prev=>{ const next=prev.map(s=>String(s.courses[courseKey]?.group)===String(groupNum)?updater(s):s); lsSet(next); return next; });
      }
    } finally { setSaving(false); }
  }, [students, dbMode]);

  return { students, loading, saving, dbMode, saveStudent, deleteStudent, importStudents, saveGroupTopic };
}


// ─────────────────────────────────────────────────────────────────────────────
// NOTICES HOOK
// ─────────────────────────────────────────────────────────────────────────────
function useNotices() {
  const [notices, setNotices] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    if (window.firebaseReady && window.db) {
      const unsub = window.db.collection("_notices")
        .orderBy("createdAt", "desc")
        .onSnapshot(snap => {
          setNotices(snap.docs.map(d => ({id: d.id, ...d.data()})));
          setLoading(false);
        }, () => { setLoading(false); });
      return () => unsub();
    } else {
      try { setNotices(JSON.parse(localStorage.getItem("notices_db") || "[]")); } catch {}
      setLoading(false);
    }
  }, []);

  const saveNotice = useCallback(async (notice) => {
    const docId = notice.id || "notice_" + Date.now();
    const data = {...notice, id: docId, updatedAt: Date.now()};
    if (!data.createdAt) data.createdAt = Date.now();
    if (window.firebaseReady && window.db) {
      await window.db.collection("_notices").doc(docId).set(data);
    } else {
      setNotices(prev => {
        const idx = prev.findIndex(n => n.id === docId);
        const next = idx >= 0 ? [...prev.slice(0,idx), data, ...prev.slice(idx+1)] : [data, ...prev];
        localStorage.setItem("notices_db", JSON.stringify(next));
        return next;
      });
    }
  }, []);

  const deleteNotice = useCallback(async (id) => {
    if (window.firebaseReady && window.db) {
      await window.db.collection("_notices").doc(id).delete();
    } else {
      setNotices(prev => {
        const next = prev.filter(n => n.id !== id);
        localStorage.setItem("notices_db", JSON.stringify(next));
        return next;
      });
    }
  }, []);

  return { notices, loading, saveNotice, deleteNotice };
}

function RepCard({student, role, courses, whatsapp, onNavCourse, onNavProg}) {
  const initials = student.name.split(" ").map(w=>w[0]||"").slice(0,2).join("").toUpperCase();
  const course = role.courseKey ? (courses||COURSES).find(c=>c.key===role.courseKey) : null;
  const roleName = role.label || (
    role.type==="courseRep" ? `${course?.code||""} Course Rep` :
    role.type==="centerRep" ? `Centre Rep${student.center?" — "+student.center:""}` :
    role.type==="programRep" ? "Programme Rep" :
    role.type==="groupRep" ? `Group Rep${course?" — "+course.code:""}` : "Student Rep"
  );
  const waGroup = whatsapp?.groups?.[`${role.courseKey||""}_${student.courses?.[role.courseKey]?.group||""}`];
  const waProg  = whatsapp?.programs?.[student.program||""];
  const waCentr = whatsapp?.centers?.[student.center||""];
  const waLink  = waGroup || waProg || waCentr;
  const handleClick = () => {
    if(role.type==="courseRep"&&role.courseKey&&onNavCourse) onNavCourse(role.courseKey);
    else if((role.type==="programRep"||role.type==="centerRep")&&onNavProg) onNavProg(student.program);
  };
  return (
    <div className="rep-card" onClick={handleClick} title="Click to view group/programme">
      <div className="rep-av">{initials}</div>
      <div className="rep-info">
        <div className="rep-name">{student.name}</div>
        <div className="rep-badge">{roleName}</div>
        {student.center&&<div className="rep-prog">{student.center}</div>}
        <div className="rep-prog">{(student.program||"").replace("BSc ","").replace("BEd ","").replace("Certificate in ","Cert. ")}</div>
        <div className="rep-contacts">
          {student.phone&&<a href={"tel:"+student.phone} className="rep-link" onClick={e=>e.stopPropagation()}>📞 {student.phone}</a>}
          {student.email&&<a href={"mailto:"+student.email} className="rep-link" onClick={e=>e.stopPropagation()}>✉️ {student.email}</a>}
          {waLink&&<a href={waLink} target="_blank" rel="noopener noreferrer" className="rep-wa" onClick={e=>e.stopPropagation()}>💬 WhatsApp</a>}
        </div>
      </div>
    </div>
  );
}

function RepBoard({students, courses, whatsapp, onNavCourse, onNavProg}) {
  const reps = students.filter(s=>s.repRoles&&s.repRoles.length>0);
  if(!reps.length) return null;
  return (
    <div className="rep-board">
      <div className="rep-board-title">🎖️ Student Representatives</div>
      <div className="rep-cards-row">
        {reps.flatMap(s=>(s.repRoles||[]).map((role,ri)=>(
          <RepCard key={s.id+"_"+ri} student={s} role={role} courses={courses} whatsapp={whatsapp} onNavCourse={onNavCourse} onNavProg={onNavProg}/>
        )))}
      </div>
    </div>
  );
}

                <span style={{fontSize:11,color:"var(--sub)",fontFamily:"Arial,sans-serif"}}>Programme group:</span>
                <a href={whatsapp.programs[student.program||""]} target="_blank" rel="noopener noreferrer" className="wa-btn" style={{padding:"2px 10px",fontSize:11}} onClick={e=>e.stopPropagation()}>💬 WhatsApp</a>
              </div>
            )}
            {student.center&&whatsapp?.centers?.[student.center]&&(
              <div style={{marginTop:6,display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:11,color:"var(--sub)",fontFamily:"Arial,sans-serif"}}>Centre group:</span>
                <a href={whatsapp.centers[student.center]} target="_blank" rel="noopener noreferrer" className="wa-btn" style={{padding:"2px 10px",fontSize:11}} onClick={e=>e.stopPropagation()}>💬 WhatsApp</a>
              </div>
            )}
          </div>
        </React.Fragment>
      )}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// COURSE VIEW
// ─────────────────────────────────────────────────────────────────────────────
function CourseView({students, whatsapp, courses, initialCourse}){
  const activeCourses = courses || COURSES;
  const getCourseLabel = (key) => (activeCourses.find(c=>c.key===key)||COURSES.find(c=>c.key===key)||{label:key}).label;
  const getCourseCode  = (key) => (activeCourses.find(c=>c.key===key)||COURSES.find(c=>c.key===key)||{code:key}).code;
  const getWaLink = (type, key) => whatsapp?.[type]?.[key] || "";
  const [active,setActive]=useState(initialCourse||activeCourses[0]?.key||COURSES[0].key);
  const [grpFilter,setGrpFilter]=useState("all");
  const [search,setSearch]=useState("");
  useEffect(()=>{setGrpFilter("all");setSearch("");},[active]);
  useEffect(()=>{if(initialCourse)setActive(initialCourse);},[initialCourse]);
  const course=activeCourses.find(c=>c.key===active);
  const groups=useMemo(()=>{
    const gs=new Set(); students.forEach(s=>{const g=s.courses?.[active]?.group;if(g)gs.add(g);}); return["all",...[...gs].sort((a,b)=>a.localeCompare(b,undefined,{numeric:true}))];
  },[students,active]);
  const visible=useMemo(()=>{
    return[...students].filter(s=>{
      const c=s.courses?.[active]; if(!c?.group)return false;
      if(grpFilter!=="all"&&c.group!==grpFilter)return false;
      if(search){const q=search.toLowerCase();return s.name.toLowerCase().includes(q)||(s.indexNumber||"").toLowerCase().includes(q)||(c.topic||"").toLowerCase().includes(q);}
      return true;
    }).sort((a,b)=>{const ga=a.courses[active].group,gb=b.courses[active].group;return ga!==gb?ga.localeCompare(gb,undefined,{numeric:true}):a.name.localeCompare(b.name);});
  },[students,active,grpFilter,search]);
  const byGrp=useMemo(()=>{const m={};visible.forEach(s=>{const g=s.courses[active].group;if(!m[g])m[g]=[];m[g].push(s);});return m;},[visible,active]);
  const doPrint=()=>{const{html,title}=buildPrintHTML(students,active,grpFilter);printTable(html,title);};
  return (
    <div>
      <div className="course-tabs-wrap">
        <div className="course-tabs">
          {activeCourses.map(c=>{
            const cnt=students.filter(s=>s.courses?.[c.key]?.group).length;
            return(
              <button key={c.key} className={"c-tab"+(active===c.key?" on":"")} onClick={()=>setActive(c.key)}>
                <span style={{fontWeight:600}}>{getCourseLabel(c.key)}</span>
                <span className="c-tab-code">{getCourseCode(c.key)}</span>
                <span className="badge">{cnt}</span>
              </button>
            );
          })}
        </div>
      </div>
      <div className="cv-controls">
        <div className="search-wrap">
          <SearchIco/>
          <input className="search-input" placeholder="Search name, index, topic…" value={search} onChange={e=>setSearch(e.target.value)}/>
          {search&&<button className="x-small" onClick={()=>setSearch("")}>✕</button>}
        </div>
        <select className="sel" value={grpFilter} onChange={e=>setGrpFilter(e.target.value)}>
          {groups.map(g=><option key={g} value={g}>{g==="all"?"All Groups":`Group ${g}`}</option>)}
        </select>
        <button className="btn-print" onClick={doPrint}><PrintIco/> Print / PDF</button>
        <button className="btn-excel" onClick={()=>exportCourseXLSX(students,active,grpFilter)}><ExcelIco/> Export Excel</button>
      </div>
      <div style={{marginBottom:16}}>
        <h2 style={{fontSize:22,color:"var(--navy)",fontWeight:700,margin:0}}>{getCourseLabel(active)} <span style={{fontSize:16,color:"var(--sub)",fontWeight:400}}>({getCourseCode(active)})</span></h2>
        <p className="lead" style={{marginTop:4}}>{grpFilter==="all"?"All Groups":`Group ${grpFilter}`} &nbsp;·&nbsp; {visible.length} student{visible.length!==1?"s":""}</p>
      </div>
      {visible.length===0
        ?<div className="empty">No students assigned to this course{grpFilter!=="all"?` in Group ${grpFilter}`:""} yet.</div>
        :(
          <div className="tbl-wrap">
            <table>
              <thead><tr><th>#</th><th>Full Name</th><th>Index No.</th><th>Programme</th><th>Group</th><th>Research Topic / Assignment</th><th>Contact</th></tr></thead>
              <tbody>
                {Object.entries(byGrp).map(([g,list])=>[
                  grpFilter==="all"&&<tr key={"h"+g} className="grp-hdr"><td colSpan={7} style={{padding:"8px 14px"}}>
                    <div className="grp-hdr-row">
                      <span style={{fontSize:12,letterSpacing:.5,fontFamily:"Arial,sans-serif"}}>Group {g}</span>
                      {getWaLink("groups",active+"_"+g)&&<a className="wa-btn sm" href={getWaLink("groups",active+"_"+g)} target="_blank" rel="noopener">💬 WhatsApp</a>}
                    </div>
                  </td></tr>,
                  ...list.map((s,i)=>(
                    <tr key={s.id} className={i%2===0?"even":""}>
                      <td>{i+1}</td><td style={{fontWeight:600}}>{s.name}</td>
                      <td>{s.indexNumber||<span className="dash">—</span>}</td>
                      <td>{s.program||<span className="dash">—</span>}</td>
                      <td><span className="grp-badge">Group {s.courses[active]?.group}</span></td>
                      <td>{s.courses[active]?.topic||<span className="dash">Not assigned</span>}</td>
                      <td style={{fontSize:11,fontFamily:"Arial,sans-serif"}}>
                        {s.phone&&<div>📞 {s.phone}</div>}
                        {s.email&&<div>✉️ {s.email}</div>}
                        {!s.phone&&!s.email&&<span className="dash">—</span>}
                      </td>
                    </tr>
                  ))
                ])}
              </tbody>
            </table>
          </div>
        )
      }
    </div>
  );
}


// ─────────────────────────────────────────────────────────────────────────────
// ADMIN DASHBOARD
// ─────────────────────────────────────────────────────────────────────────────
function AdminDashboard({students}) {
  const total = students.length;
  const byCourse = COURSES.map(c=>{
    const asgn = students.filter(s=>s.courses[c.key]?.group);
    const grps = new Set(asgn.map(s=>s.courses[c.key].group));
    return {...c, assigned:asgn.length, groups:grps.size};
  });
  const fully = students.filter(s=>COURSES.every(c=>s.courses[c.key]?.group)).length;
  const progs = {};
  students.forEach(s=>{const p=s.program||"Unknown";progs[p]=(progs[p]||0)+1;});
  const progList = Object.entries(progs).sort((a,b)=>b[1]-a[1]);
  const totalGroups = byCourse.reduce((a,c)=>a+c.groups,0);
  const unassigned = total - students.filter(s=>COURSES.some(c=>s.courses[c.key]?.group)).length;
  return (
    <div>
      <div style={{marginBottom:24}}><h1>Dashboard</h1><p className="lead">Overview of the UCC CoDE student database.</p></div>
      <div className="stat-cards">
        <div className="stat-card"><div className="stat-num">{total}</div><div className="stat-label">Total Students</div></div>
        <div className="stat-card s-green"><div className="stat-num">{fully}</div><div className="stat-label">Fully Assigned</div></div>
        <div className="stat-card s-gold"><div className="stat-num">{totalGroups}</div><div className="stat-label">Total Groups</div></div>
        <div className="stat-card s-purple"><div className="stat-num">{progList.length}</div><div className="stat-label">Programmes</div></div>
        {unassigned>0&&<div className="stat-card s-red"><div className="stat-num">{unassigned}</div><div className="stat-label">Zero Assignments</div></div>}
      </div>
      <div className="dash-section">
        <h3>Course Enrollment</h3>
        {byCourse.map(c=>(
          <div key={c.key} className="bar-row">
            <div className="bar-label" title={c.label}>{c.code}</div>
            <div className="bar-track"><div className="bar-fill" style={{width:total?`${c.assigned/total*100}%`:"0%"}}/></div>
            <div className="bar-val">{c.assigned}/{total}</div>
            <div className="bar-extra">{c.groups} grp{c.groups!==1?"s":""}</div>
          </div>
        ))}
      </div>
      <div className="dash-section">
        <h3>Programme Breakdown</h3>
        {progList.map(([p,n])=>(
          <div key={p} className="bar-row">
            <div className="bar-label" title={p}>{p.replace("BSc ","").replace("BEd ","BEd ").replace("Certificate in ","Cert. ")}</div>
            <div className="bar-track"><div className="bar-fill alt" style={{width:total?`${n/total*100}%`:"0%"}}/></div>
            <div className="bar-val">{n}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// GROUPS MANAGER
// ─────────────────────────────────────────────────────────────────────────────
function GroupsManager({students, onSaveGroupTopic, onSaveStudent}) {
  const [courseKey,setCourseKey] = useState(COURSES[0].key);
  const [editing,setEditing] = useState(null);
  const [draft,setDraft] = useState("");
  const [expanded,setExpanded] = useState({});

  const course = COURSES.find(c=>c.key===courseKey);
  const grpMap = {};
  students.forEach(s=>{
    const g=s.courses[courseKey]?.group;
    if(g){
      if(!grpMap[g]) grpMap[g]={group:g,topic:s.courses[courseKey]?.topic||"",members:[]};
      grpMap[g].members.push(s);
    }
  });
  const groups = Object.values(grpMap).sort((a,b)=>Number(a.group)-Number(b.group));
  const unassigned = students.filter(s=>!s.courses[courseKey]?.group);

  const startEdit = (g) => {setEditing(g.group);setDraft(g.topic);};
  const saveTopic = async (groupNum) => { await onSaveGroupTopic(courseKey,groupNum,draft); setEditing(null); };
  const toggleExpand = (g) => setExpanded(p=>({...p,[g]:!p[g]}));

  return (
    <div>
      <div className="groups-header">
        <div><h1>Group Management</h1><p className="lead">Edit topics and view members for each course group.</p></div>
        <select className="sel" value={courseKey} onChange={e=>{setCourseKey(e.target.value);setEditing(null);setExpanded({});}}>
          {COURSES.map(c=><option key={c.key} value={c.key}>{c.label} ({c.code})</option>)}
        </select>
      </div>
      <div className="groups-meta">
        <span className="meta-pill">{groups.length} groups</span>
        <span className="meta-pill">{students.filter(s=>s.courses[courseKey]?.group).length} assigned</span>
        {unassigned.length>0&&<span className="meta-pill bad">{unassigned.length} unassigned</span>}
      </div>
      {groups.length===0
        ?<div className="empty">No group assignments for {course.label} yet. Use the Wizard to assign students.</div>
        :<div className="groups-list">
          {groups.map(g=>(
            <div key={g.group} className="group-row">
              <div className="group-row-top">
                <div className="group-num-badge">Group {g.group}</div>
                <div className="group-topic-area">
                  {editing===g.group
                    ?<div className="topic-edit-row">
                        <input className="inp sm-inp" style={{flex:1}} value={draft} onChange={e=>setDraft(e.target.value)} placeholder="Topic title…" onKeyDown={e=>{if(e.key==="Enter")saveTopic(g.group);if(e.key==="Escape")setEditing(null);}} autoFocus/>
                        <button className="btn-sm s" onClick={()=>saveTopic(g.group)}>Save</button>
                        <button className="btn-sm c" onClick={()=>setEditing(null)}>✕</button>
                      </div>
                    :<div className="topic-view-row" onClick={()=>startEdit(g)} title="Click to edit topic">
                        {g.topic?<span className="g-topic">{g.topic}</span>:<span className="no-topic">No topic — click to add</span>}
                        <span className="edit-hint">✏️ Edit</span>
                      </div>
                  }
                </div>
                <div className="group-cnt">{g.members.length} student{g.members.length!==1?"s":""}</div>
              </div>
              <button className="toggle-members" onClick={()=>toggleExpand(g.group)}>
                {expanded[g.group]?"▲ Hide members":"▼ View members"}
              </button>
              {expanded[g.group]&&(
                <ul className="member-list">
                  {g.members.sort((a,b)=>a.name.localeCompare(b.name)).map(m=>(
                    <li key={m.id}><span>{m.name}</span><span className="m-idx">{m.indexNumber}</span></li>
                  ))}
                </ul>
              )}
            </div>
          ))}
        </div>
      }
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// WIZARD PANEL
// ─────────────────────────────────────────────────────────────────────────────
function WizardPanel({students, onSaveGroupTopic, onSaveStudent}) {
  const [tool,setTool] = useState(null);
  const [step,setStep] = useState(1);

  // Quick Assign state
  const [qaCourse,setQaCourse] = useState(COURSES[0].key);
  const [qaGroup,setQaGroup] = useState("");
  const [qaTopic,setQaTopic] = useState("");
  const [qaSearch,setQaSearch] = useState("");
  const [qaSelected,setQaSelected] = useState([]);
  const [qaResult,setQaResult] = useState(null);

  // Bulk Topic state
  const [btCourse,setBtCourse] = useState(COURSES[0].key);
  const [btEdits,setBtEdits] = useState({});
  const [btSaved,setBtSaved] = useState(false);

  // Find Gaps state
  const [gapCourse,setGapCourse] = useState(COURSES[0].key);

  const qaUnassigned = students
    .filter(s=>!s.courses[qaCourse]?.group && (s.name.toLowerCase().includes(qaSearch.toLowerCase())||(s.indexNumber||"").toLowerCase().includes(qaSearch.toLowerCase())))
    .sort((a,b)=>a.name.localeCompare(b.name));
  const qaExistingGroups = [...new Set(students.map(s=>s.courses[qaCourse]?.group).filter(Boolean))].sort((a,b)=>Number(a)-Number(b));

  const toggleQaSel = (id) => setQaSelected(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);
  const selectAll = () => setQaSelected(qaUnassigned.map(s=>s.id));
  const clearSel = () => setQaSelected([]);

  const doQuickAssign = async () => {
    let done=0;
    for(const sid of qaSelected) {
      const s=students.find(st=>st.id===sid);
      if(!s)continue;
      const updated={...s,courses:{...s.courses,[qaCourse]:{group:String(qaGroup),topic:qaTopic}}};
      await onSaveStudent(updated);
      done++;
    }
    setQaResult(done);
    setStep(4);
  };

  const btGroups = React.useMemo(()=>[...new Set(students.map(s=>s.courses[btCourse]?.group).filter(Boolean))]
    .sort((a,b)=>Number(a)-Number(b))
    .map(g=>{
      const sample=students.find(s=>s.courses[btCourse]?.group===g);
      return {group:g,topic:btEdits[g]!==undefined?btEdits[g]:(sample?.courses[btCourse]?.topic||""),count:students.filter(s=>s.courses[btCourse]?.group===g).length};
    }),[students,btCourse,btEdits]);

  const doBulkTopics = async () => {
    for(const [g,t] of Object.entries(btEdits)) await onSaveGroupTopic(btCourse,g,t);
    setBtEdits({});setBtSaved(true);
  };

  const gapStudents = students.filter(s=>!s.courses[gapCourse]?.group).sort((a,b)=>a.name.localeCompare(b.name));

  const reset = () => {setTool(null);setStep(1);setQaSelected([]);setQaSearch("");setQaGroup("");setQaTopic("");setQaResult(null);setBtEdits({});setBtSaved(false);};

  if(!tool) return (
    <div>
      <div style={{marginBottom:24}}><h1>Wizard</h1><p className="lead">Accelerate repetitive tasks with guided tools.</p></div>
      <div className="wizard-tools">
        <div className="wizard-tool" onClick={()=>{setTool("qa");setStep(1);}}>
          <div className="tool-icon">⚡</div>
          <div className="tool-title">Quick Assign</div>
          <div className="tool-desc">Assign multiple unassigned students to a group in any course in one go.</div>
        </div>
        <div className="wizard-tool" onClick={()=>{setTool("bt");setStep(1);}}>
          <div className="tool-icon">✏️</div>
          <div className="tool-title">Bulk Edit Topics</div>
          <div className="tool-desc">Edit all group topics for a course on one screen — no clicking around.</div>
        </div>
        <div className="wizard-tool" onClick={()=>{setTool("gaps");setStep(1);}}>
          <div className="tool-icon">🔍</div>
          <div className="tool-title">Find Unassigned</div>
          <div className="tool-desc">Instantly see which students have no group for any course.</div>
        </div>
      </div>
    </div>
  );

  // QUICK ASSIGN ─────────────────────────────────────────────────────────────
  if(tool==="qa") {
    const steps=["Course","Group","Students","Done"];
    const stepBar = (
      <div className="step-bar">
        {steps.map((l,i)=>(
          <React.Fragment key={l}>
            <div className={"s-dot"+(step>i+1?" done":step===i+1?" active":"")}>{step>i+1?"✓":i+1}</div>
            {i<steps.length-1&&<div className={"s-line"+(step>i+1?" done":"")}/>}
          </React.Fragment>
        ))}
      </div>
    );
    return (
      <div className="wiz-shell">
        <div className="wiz-hdr">
          <span className="wiz-title">⚡ Quick Assign Wizard</span>
          <button className="wiz-back" onClick={reset}>← Back to Tools</button>
        </div>
        <div className="wiz-body">
          {stepBar}
          {step===1&&(
            <div>
              <label className="lbl">Select Course</label>
              <p className="lead" style={{marginBottom:12}}>Which course do you want to assign students to?</p>
              <select className="inp" value={qaCourse} onChange={e=>setQaCourse(e.target.value)}>
                {COURSES.map(c=><option key={c.key} value={c.key}>{c.label} ({c.code})</option>)}
              </select>
              <p className="lead" style={{marginTop:8}}>{students.filter(s=>!s.courses[qaCourse]?.group).length} students currently unassigned in this course.</p>
              <div className="wiz-actions"><button className="btn-next" onClick={()=>setStep(2)}>Next →</button></div>
            </div>
          )}
          {step===2&&(
            <div>
              <label className="lbl">Select or Create Group</label>
              <p className="lead" style={{marginBottom:12}}>Type a group number. Existing groups shown below.</p>
              <input className="inp" value={qaGroup} onChange={e=>setQaGroup(e.target.value)} placeholder="e.g. 8"/>
              {qaExistingGroups.length>0&&<div style={{marginTop:10,display:"flex",gap:6,flexWrap:"wrap"}}>
                {qaExistingGroups.map(g=><button key={g} className={"grp-badge"} style={{cursor:"pointer",border:qaGroup===g?"2px solid var(--teal)":"2px solid transparent"}} onClick={()=>setQaGroup(g)}>Group {g}</button>)}
              </div>}
              <label className="lbl" style={{marginTop:14,display:"block"}}>Topic (optional)</label>
              <input className="inp" value={qaTopic} onChange={e=>setQaTopic(e.target.value)} placeholder="Group topic…"/>
              <div className="wiz-actions">
                <button className="btn-cancel" onClick={()=>setStep(1)}>← Back</button>
                <button className="btn-next" disabled={!qaGroup.trim()} onClick={()=>setStep(3)}>Next →</button>
              </div>
            </div>
          )}
          {step===3&&(
            <div>
              <label className="lbl">Select Students to Assign to Group {qaGroup}</label>
              <div style={{display:"flex",gap:8,marginTop:8}}>
                <input className="inp sm-inp" style={{flex:1}} placeholder="Search name or index…" value={qaSearch} onChange={e=>setQaSearch(e.target.value)}/>
                <button className="btn-sm s" onClick={selectAll}>All</button>
                <button className="btn-sm c" onClick={clearSel}>None</button>
              </div>
              {qaUnassigned.length===0?<div className="empty" style={{padding:"30px 0"}}>No unassigned students match.</div>
                :<div className="pick-list">
                  {qaUnassigned.map(s=>(
                    <div key={s.id} className={"pick-item"+(qaSelected.includes(s.id)?" sel":"")} onClick={()=>toggleQaSel(s.id)}>
                      <span>{qaSelected.includes(s.id)?"☑":"☐"}</span>
                      <span className="pick-name">{s.name}</span>
                      <span className="pick-idx">{s.indexNumber}</span>
                    </div>
                  ))}
                </div>
              }
              <p style={{fontSize:12,color:"var(--sub)",fontFamily:"Arial,sans-serif",marginTop:8}}>{qaSelected.length} selected</p>
              <div className="wiz-actions">
                <button className="btn-cancel" onClick={()=>setStep(2)}>← Back</button>
                <button className="btn-next" disabled={qaSelected.length===0||!qaGroup} onClick={doQuickAssign}>Assign {qaSelected.length} Students →</button>
              </div>
            </div>
          )}
          {step===4&&(
            <div className="success-box">
              <div className="s-icon">✅</div>
              <div className="s-msg">{qaResult} student{qaResult!==1?"s":""} assigned to Group {qaGroup}!</div>
              <div className="s-sub">They now appear under {COURSES.find(c=>c.key===qaCourse)?.label} → Group {qaGroup}.</div>
              <div style={{marginTop:24,display:"flex",gap:12,justifyContent:"center"}}>
                <button className="btn-cancel" onClick={()=>{setStep(1);setQaSelected([]);setQaResult(null);}}>Assign More</button>
                <button className="btn-next" onClick={reset}>← Back to Tools</button>
              </div>
            </div>
          )}
        </div>
      </div>
    );
  }

  // BULK TOPIC ────────────────────────────────────────────────────────────────
  if(tool==="bt") return (
    <div className="wiz-shell">
      <div className="wiz-hdr">
        <span className="wiz-title">✏️ Bulk Edit Topics</span>
        <button className="wiz-back" onClick={reset}>← Back to Tools</button>
      </div>
      <div className="wiz-body">
        <div style={{display:"flex",gap:12,alignItems:"center",marginBottom:16,flexWrap:"wrap"}}>
          <label className="lbl">Course:</label>
          <select className="sel" value={btCourse} onChange={e=>{setBtCourse(e.target.value);setBtEdits({});setBtSaved(false);}}>
            {COURSES.map(c=><option key={c.key} value={c.key}>{c.label} ({c.code})</option>)}
          </select>
          <span style={{color:"var(--sub)",fontSize:12,fontFamily:"Arial,sans-serif"}}>{btGroups.length} groups</span>
        </div>
        {btGroups.length===0?<div className="empty">No groups assigned for this course yet.</div>
          :<React.Fragment>
            <p className="lead" style={{marginBottom:12}}>Edit any topic below. Changes are saved when you click Save All.</p>
            <div className="bulk-topic-grid">
              {btGroups.map(g=>(
                <div key={g.group} className="bt-row">
                  <div className="bt-grp">Grp {g.group}</div>
                  <input className="bt-inp" value={g.topic} onChange={e=>setBtEdits(p=>({...p,[g.group]:e.target.value}))} placeholder="Topic…"/>
                  <div className="bt-cnt">{g.count} student{g.count!==1?"s":""}</div>
                </div>
              ))}
            </div>
            {btSaved&&<p className="msg-ok" style={{marginTop:10}}>✅ All topics saved successfully!</p>}
            <div className="wiz-actions">
              <button className="btn-cancel" onClick={reset}>Cancel</button>
              <button className="btn-next" disabled={Object.keys(btEdits).length===0} onClick={doBulkTopics}>Save All Topics</button>
            </div>
          </React.Fragment>
        }
      </div>
    </div>
  );

  // FIND GAPS ─────────────────────────────────────────────────────────────────
  if(tool==="gaps") return (
    <div className="wiz-shell">
      <div className="wiz-hdr">
        <span className="wiz-title">🔍 Find Unassigned Students</span>
        <button className="wiz-back" onClick={reset}>← Back to Tools</button>
      </div>
      <div className="wiz-body">
        <div style={{display:"flex",gap:12,alignItems:"center",marginBottom:16,flexWrap:"wrap"}}>
          <label className="lbl">Course:</label>
          <select className="sel" value={gapCourse} onChange={e=>setGapCourse(e.target.value)}>
            {COURSES.map(c=><option key={c.key} value={c.key}>{c.label} ({c.code})</option>)}
          </select>
        </div>
        {gapStudents.length===0
          ?<div className="success-box"><div className="s-icon">🎉</div><div className="s-msg">All students assigned!</div><div className="s-sub">Every student has a group assignment for {COURSES.find(c=>c.key===gapCourse)?.label}.</div></div>
          :<React.Fragment>
            <p className="lead" style={{marginBottom:12}}><b>{gapStudents.length}</b> student{gapStudents.length!==1?"s":""} with no group assignment for {COURSES.find(c=>c.key===gapCourse)?.label}:</p>
            <div className="pick-list" style={{maxHeight:400}}>
              {gapStudents.map(s=>(
                <div key={s.id} className="pick-item" style={{cursor:"default"}}>
                  <span className="pick-name">{s.name}</span>
                  <span className="pick-idx">{s.indexNumber}</span>
                  <span style={{fontSize:11,color:"var(--sub)",fontFamily:"Arial,sans-serif"}}>{s.program?.replace("BSc ","").replace("Certificate in ","Cert. ")||""}</span>
                </div>
              ))}
            </div>
          </React.Fragment>
        }
      </div>
    </div>
  );

  return null;
}

    if (pwd.cur !== adminPassword) { setPwdMsg("Current password incorrect."); return; }
    if (pwd.nw.length < 4)         { setPwdMsg("Min 4 characters."); return; }
    if (pwd.nw !== pwd.cf)         { setPwdMsg("Passwords do not match."); return; }
    onPasswordChange(pwd.nw);
    setPwd({cur:"",nw:"",cf:""});
    setPwdMsg("✅ Password changed!"); setTimeout(()=>setPwdMsg(""),4000);

  /* ── Courses — LOCAL editable copy ── */

function NoticeCard({notice}) {
  const [expanded, setExpanded] = useState(false);
  const PREVIEW = 220;
  const body = notice.body || "";
  const long = body.length > PREVIEW;
  const shown = (!long || expanded) ? body : body.slice(0, PREVIEW) + "…";
  const cat = notice.category || "general";
  const date = notice.createdAt ? new Date(notice.createdAt).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"}) : "";
  return (
    <div className={`nb-card ${notice.pinned?"pinned":""} ${cat}`}>
      <div className="nb-card-head">
        {notice.pinned && <span className="nb-pin">📌</span>}
        <div className="nb-info">
          <div className={`nb-cat ${cat}`}>{CAT_LABELS[cat]||cat}</div>
          <div className="nb-title">{notice.title}</div>
          <div className="nb-meta">Posted {date}{notice.postedBy ? " · " + notice.postedBy : ""}</div>
        </div>
      </div>
      {body && (
        <div className="nb-body">
          {shown}
          {long && <React.Fragment><br/><button className="nb-expand-btn" onClick={()=>setExpanded(p=>!p)}>{expanded?"▲ Show less":"▼ Read more"}</button></React.Fragment>}
        </div>
      )}
    </div>
  );
}

function Noticeboard({notices, loading}) {
  const [catFilter, setCatFilter] = useState("all");
  const active = notices.filter(n => n.active !== false);
  const filtered = catFilter === "all" ? active : active.filter(n => (n.category||"general") === catFilter);
  const sorted = [...filtered].sort((a,b) => {
    if (a.pinned && !b.pinned) return -1;
    if (!a.pinned && b.pinned) return 1;
    return (b.createdAt||0) - (a.createdAt||0);
  });
  return (
    <div>
      <div className="nb-header">
        <div>
          <h1>📋 Noticeboard</h1>
          <p className="lead">Announcements and updates from the course administrator.</p>
        </div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          {["all","urgent","info","reminder","event","general"].map(c=>(
            <button key={c} onClick={()=>setCatFilter(c)}
              style={{padding:"6px 13px",borderRadius:20,border:"1px solid var(--border)",fontSize:12,fontFamily:"Arial,sans-serif",cursor:"pointer",
                background:catFilter===c?"var(--navy)":"var(--white)",color:catFilter===c?"#fff":"var(--text)",fontWeight:catFilter===c?700:400}}>
              {c==="all"?"All":CAT_LABELS[c]}
            </button>
          ))}
        </div>
      </div>
      {loading ? <div className="empty">Loading notices…</div>
        : sorted.length === 0
          ? <div className="nb-empty"><div className="nb-empty-icon">📭</div><div style={{fontWeight:700,fontSize:16,color:"var(--navy)",marginBottom:6}}>{catFilter==="all"?"No notices yet":"No notices in this category"}</div><p style={{fontSize:13,fontFamily:"Arial,sans-serif"}}>Check back later for updates from your course admin.</p></div>
          : <div className="nb-grid">{sorted.map(n=><NoticeCard key={n.id} notice={n}/>)}</div>
      }
    </div>
  );
}

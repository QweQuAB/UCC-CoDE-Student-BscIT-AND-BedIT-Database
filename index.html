  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy:  #0d1b2a;
      --teal:  #1b6ca8;
      --gold:  #f0a500;
      --light: #f4f7fb;
      --white: #ffffff;
      --border:#dde3ec;
      --text:  #1a2332;
      --sub:   #5a6a7e;
      --green: #27ae60;
      --red:   #c0392b;
    }
    body { font-family: 'Georgia','Times New Roman',serif; background: var(--light); color: var(--text); min-height: 100vh; }
    button { cursor: pointer; }
    input, select, textarea { font-family: inherit; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--light); }
    ::-webkit-scrollbar-thumb { background: #c8d4e3; border-radius: 3px; }
    /* ── LAYOUT ── */
    #root { display: flex; flex-direction: column; min-height: 100vh; }
    .hdr { background: var(--navy); position: sticky; top: 0; z-index: 100; }
    .hdr-inner { max-width: 1400px; margin: 0 auto; padding: 13px 24px; display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
    .stripe { height: 3px; background: linear-gradient(90deg,var(--gold),var(--teal)); }
    .logo { display: flex; align-items: center; gap: 12px; }
    .logo-mk { background: var(--gold); color: var(--navy); font-weight: 900; font-size: 12px; padding: 5px 8px; border-radius: 4px; letter-spacing: 1px; }
    .logo-title { color: #fff; font-weight: 700; font-size: 15px; line-height: 1.2; }
    .logo-sub { color: #8899bb; font-size: 11px; font-family: Arial,sans-serif; }
    nav { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
    .nav-btn { background: transparent; border: 1px solid #ffffff22; color: #ccd; padding: 7px 15px; border-radius: 6px; font-size: 13px; font-family: Georgia,serif; transition: all .15s; }
    .nav-btn:hover { border-color: #ffffff44; background: #ffffff11; }
    .nav-btn.on { background: var(--teal); color: #fff; border-color: var(--teal); }
    .logout-btn { background: transparent; border: 1px solid #c0392b55; color: #e77; padding: 7px 12px; border-radius: 6px; font-size: 12px; font-family: Georgia,serif; }
    main { max-width: 1400px; margin: 0 auto; padding: 32px 24px; flex: 1; width: 100%; }
    footer { text-align: center; padding: 22px; color: #aaa; font-size: 12px; font-family: Arial,sans-serif; border-top: 1px solid var(--border); margin-top: 40px; }
    /* ── TYPOGRAPHY ── */
    h1 { font-size: 24px; color: var(--navy); font-weight: 700; }
    .lead { color: var(--sub); font-size: 13px; font-family: Arial,sans-serif; margin-top: 6px; }
    /* ── CONTROLS ── */
    .filter-bar { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
    .search-wrap { flex: 1; min-width: 180px; display: flex; align-items: center; gap: 8px; background: var(--white); border: 1px solid var(--border); border-radius: 8px; padding: 0 12px; color: var(--sub); }
    .search-wrap svg { flex-shrink: 0; }
    .search-input { flex: 1; border: none; outline: none; padding: 9px 0; font-size: 14px; background: transparent; font-family: Georgia,serif; color: var(--text); }
    .x-small { background: none; border: none; font-size: 15px; color: var(--sub); padding: 0 2px; }
    select.sel { padding: 9px 13px; border: 1px solid var(--border); border-radius: 8px; background: var(--white); font-size: 13px; color: var(--text); font-family: Georgia,serif; }
    /* ── BUTTONS ── */
    .btn-print  { background: #fff; border: 1px solid var(--border); color: var(--text); padding: 9px 16px; border-radius: 8px; font-size: 13px; display: inline-flex; align-items: center; gap: 7px; font-family: Georgia,serif; }
    .btn-excel  { background: #e8f7ee; border: 1px solid #b7dfc6; color: #217346; padding: 9px 16px; border-radius: 8px; font-size: 13px; display: inline-flex; align-items: center; gap: 7px; font-family: Georgia,serif; }
    .btn-import { background: #fff7e6; border: 1px solid #f5cfa0; color: #b7680a; padding: 9px 16px; border-radius: 8px; font-size: 13px; display: inline-flex; align-items: center; gap: 7px; font-family: Georgia,serif; }
    .btn-seed{background:#a78bfa;color:#fff;border:none;padding:9px 14px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;}
.btn-seed:hover{background:#7c3aed;}
.btn-add    { background: var(--gold); color: var(--navy); border: none; padding: 9px 18px; border-radius: 8px; font-weight: 700; font-size: 13px; display: inline-flex; align-items: center; gap: 7px; font-family: Georgia,serif; }
    .btn-save   { background: var(--teal); color: #fff; border: none; padding: 10px 22px; border-radius: 7px; font-size: 14px; font-weight: 600; font-family: Georgia,serif; }
    .btn-cancel { background: var(--light); border: 1px solid var(--border); padding: 9px 18px; border-radius: 7px; font-size: 14px; font-family: Georgia,serif; color: var(--text); }
    .btn-edit   { background: #e8f4fd; border: none; color: var(--teal); padding: 6px 8px; border-radius: 6px; }
    .btn-del    { background: #fdeaea; border: none; color: var(--red); padding: 6px 8px; border-radius: 6px; }
    /* ── TABLE ── */
    .tbl-wrap { overflow-x: auto; background: var(--white); border-radius: 10px; border: 1px solid var(--border); margin-bottom: 20px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; font-family: Arial,sans-serif; }
    thead tr { background: var(--navy); }
    th { color: #fff; padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 600; letter-spacing: .5px; white-space: nowrap; }
    td { padding: 9px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr.even td { background: #f9fbfd; }
    .grp-badge { background: #e8f4fd; color: var(--teal); padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; white-space: nowrap; }
    .grp-hdr td { background: #f0f4fa; color: var(--navy); font-weight: 700; font-size: 12px; letter-spacing: .5px; }
    .dash { color: #bbb; }
    /* ── CARDS ── */
    .card-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(320px,1fr)); gap: 12px; }
    .card { background: var(--white); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    .card-hdr { display: flex; align-items: center; gap: 13px; padding: 15px 17px; cursor: pointer; }
    .avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg,var(--teal),var(--navy)); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; flex-shrink: 0; }
    .card-name { font-weight: 700; font-size: 15px; }
    .card-sub  { color: var(--sub); font-size: 12px; font-family: Arial,sans-serif; margin-top: 2px; }
    .card-body { padding: 0 17px 15px; border-top: 1px solid var(--border); }
    .chip { margin: 10px 0 0; background: var(--light); border-radius: 7px; padding: 9px 12px; }
    .chip-top { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 4px; }
    .chip-course { font-weight: 700; font-size: 13px; color: var(--navy); }
    .chip-code { font-size: 10px; color: var(--sub); }
    .chip-grp { background: var(--teal); color: #fff; font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 700; margin-left: auto; }
    .chip-topic { font-size: 12px; color: #444; font-style: italic; font-family: Arial,sans-serif; }
    /* ── COURSE TABS ── */
    .course-tabs-wrap { overflow-x: auto; margin-bottom: 20px; }
    .course-tabs { display: flex; gap: 4px; min-width: max-content; }
    .c-tab { background: var(--white); border: 1px solid var(--border); padding: 10px 16px; border-radius: 8px; font-size: 13px; color: var(--sub); font-family: Georgia,serif; display: flex; flex-direction: column; align-items: flex-start; gap: 2px; }
    .c-tab.on { background: var(--navy); color: #fff; border-color: var(--navy); }
    .c-tab-code { font-size: 10px; opacity: .7; }
    .badge { background: var(--light); color: var(--sub); font-size: 10px; padding: 1px 6px; border-radius: 10px; font-family: Arial,sans-serif; font-weight: 700; }
    .c-tab.on .badge { background: rgba(255,255,255,.2); color: #fff; }
    /* ── MODAL ── */
    .overlay { position: fixed; inset: 0; background: #00000066; display: flex; align-items: center; justify-content: center; z-index: 999; padding: 20px; }
    .modal { background: var(--white); border-radius: 12px; width: 100%; max-width: 640px; max-height: 90vh; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 20px 60px #00000044; }
    .modal-head { padding: 17px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .modal-title { font-weight: 700; font-size: 16px; color: var(--navy); }
    .x-btn { background: none; border: none; font-size: 18px; color: var(--sub); }
    .m-tabs { display: flex; border-bottom: 1px solid var(--border); padding: 0 24px; }
    .m-tab { background: none; border: none; padding: 12px 18px; font-size: 13px; color: var(--sub); font-family: Georgia,serif; border-bottom: 2px solid transparent; }
    .m-tab.on { color: var(--teal); border-bottom: 2px solid var(--teal); font-weight: 600; }
    .modal-body { padding: 24px; overflow-y: auto; flex: 1; }
    .modal-foot { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; }
    /* ── FORMS ── */
    .form-stack { display: flex; flex-direction: column; gap: 10px; }
    label.lbl { font-weight: 600; font-size: 13px; color: var(--navy); font-family: Arial,sans-serif; }
    .inp { padding: 10px 12px; border: 1px solid var(--border); border-radius: 7px; font-size: 14px; outline: none; font-family: Georgia,serif; color: var(--text); width: 100%; }
    .inp:focus { border-color: var(--teal); }
    .sm-inp { font-size: 13px; padding: 7px 10px; }
    .c-row { border-bottom: 1px solid var(--border); padding-bottom: 14px; margin-bottom: 14px; }
    .c-label { font-size: 13px; color: var(--navy); margin-bottom: 8px; font-family: Arial,sans-serif; }
    .c-fields { display: flex; gap: 12px; flex-wrap: wrap; }
    .f-tag { display: block; font-size: 10px; color: var(--sub); margin-bottom: 4px; font-family: Arial,sans-serif; text-transform: uppercase; }
    /* ── LOGIN ── */
    .login-wrap { display: flex; justify-content: center; padding-top: 80px; }
    .login-card { background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 40px 36px; width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 14px; }
    /* ── MISC ── */
    .empty { text-align: center; padding: 60px 20px; color: var(--sub); font-size: 15px; font-family: Arial,sans-serif; }
    .stat  { color: var(--sub); font-size: 13px; font-family: Arial,sans-serif; margin-bottom: 14px; }
    .err   { color: var(--red); font-size: 12px; text-align: center; font-family: Arial,sans-serif; }
    .admin-top { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
    .admin-btns { display: flex; gap: 8px; flex-wrap: wrap; }
    .cv-controls { display: flex; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; }
    .saving-toast { position: fixed; bottom: 20px; right: 20px; background: var(--navy); color: #fff; padding: 10px 18px; border-radius: 8px; font-size: 13px; font-family: Arial,sans-serif; z-index: 9999; box-shadow: 0 4px 20px #00000033; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #ffffff44; border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    /* CONFIG NOTICE */
    .config-notice { background: #fff3cd; border: 1px solid #ffc107; border-radius: 10px; padding: 20px 24px; margin-bottom: 24px; font-family: Arial,sans-serif; }
    .config-notice h3 { color: #856404; margin-bottom: 8px; }
    .config-notice p  { color: #664d03; font-size: 13px; line-height: 1.6; }
    .config-notice code { background: #fff; border: 1px solid #ffc107; border-radius: 3px; padding: 1px 5px; font-size: 12px; }
    @media (max-width: 600px) {
      main { padding: 20px 16px; }
      .hdr-inner { padding: 10px 16px; }
      .logo-title { font-size: 13px; }
      h1 { font-size: 20px; }
    }
  </style>
</head>

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function emptyCourses() { const c={}; COURSES.forEach(x=>{c[x.key]={group:"",topic:""}}); return c; }

const LS_KEY = "ucc_students_local";

function printTable(html, title) {
  const w = window.open("","_blank","width=900,height=700");
  if (!w) { alert("Please allow pop-ups to use Print / PDF."); return; }
  w.document.write(`<!DOCTYPE html><html><head><title>${title}</title><style>
    *{box-sizing:border-box;margin:0;padding:0} body{font-family:'Times New Roman',serif;padding:32px;color:#111}
    h1{font-size:18px;margin-bottom:4px} .sub{font-size:12px;color:#555;margin-bottom:20px}
    table{width:100%;border-collapse:collapse;font-size:13px} thead tr{background:#0d1b2a;color:#fff}
    th{padding:9px 12px;text-align:left;font-size:12px;letter-spacing:.5px} td{padding:8px 12px;border-bottom:1px solid #ddd}
    tr:nth-child(even) td{background:#f5f7fa} .g{background:#e8f4fd;color:#1b6ca8;padding:2px 7px;border-radius:3px;font-weight:700;font-size:11px}
    .gh td{background:#f0f4fa;font-weight:700;font-size:12px;color:#0d1b2a;letter-spacing:.5px}
    .foot{margin-top:24px;font-size:11px;color:#888} @media print{body{padding:16px}}
  </style></head><body>
    <h1>${title}</h1>
    <div class="sub">University of Cape Coast – College of Distance Education &nbsp;|&nbsp; Printed: ${new Date().toLocaleDateString("en-GB",{day:"2-digit",month:"long",year:"numeric"})}</div>
    ${html}
    <div class="foot">UCC CoDE Student Group Database &nbsp;·&nbsp; JB IT Solutions &nbsp;·&nbsp; Use Ctrl+P or ⌘+P then "Save as PDF"</div>
  </body></html>`);
  w.document.close();
  setTimeout(()=>{w.focus();w.print();},500);
}

function buildPrintHTML(students, courseKey, groupFilter) {
  const course = COURSES.find(c=>c.key===courseKey);
  const sorted = [...students]
    .filter(s=>{ const c=s.courses?.[courseKey]; if(!c?.group)return false; if(groupFilter&&groupFilter!=="all"&&c.group!==groupFilter)return false; return true; })
    .sort((a,b)=>{ const ga=a.courses[courseKey]?.group||"",gb=b.courses[courseKey]?.group||""; return ga!==gb?ga.localeCompare(gb,undefined,{numeric:true}):a.name.localeCompare(b.name); });
  const byGrp={};
  sorted.forEach(s=>{ const g=s.courses[courseKey].group; if(!byGrp[g])byGrp[g]=[]; byGrp[g].push(s); });
  let rows="",n=0;
  Object.entries(byGrp).forEach(([g,list])=>{
    if(groupFilter==="all") rows+=`<tr class="gh"><td colspan="6">Group ${g}</td></tr>`;
    list.forEach(s=>{ n++; rows+=`<tr><td>${n}</td><td>${s.name}</td><td>${s.indexNumber||"—"}</td><td>${s.program||"—"}</td><td><span class="g">Group ${s.courses[courseKey].group}</span></td><td>${s.courses[courseKey].topic||"—"}</td></tr>`; });
  });
  const gLabel = groupFilter&&groupFilter!=="all"?` — Group ${groupFilter}`:"";
  return { title:`${course.label} (${course.code})${gLabel}`, html:`<table><thead><tr><th>#</th><th>Full Name</th><th>Index No.</th><th>Programme</th><th>Group</th><th>Research Topic</th></tr></thead><tbody>${rows}</tbody></table>` };
}

function exportCourseXLSX(students, courseKey, groupFilter) {
  const course=COURSES.find(c=>c.key===courseKey);
  const rows=[...students]
    .filter(s=>{ const c=s.courses?.[courseKey]; if(!c?.group)return false; if(groupFilter&&groupFilter!=="all"&&c.group!==groupFilter)return false; return true; })
    .sort((a,b)=>{ const ga=a.courses[courseKey]?.group||"",gb=b.courses[courseKey]?.group||""; return ga!==gb?ga.localeCompare(gb,undefined,{numeric:true}):a.name.localeCompare(b.name); })
    .map((s,i)=>({"#":i+1,"Full Name":s.name,"Index Number":s.indexNumber||"","Programme":s.program||"","Group":s.courses[courseKey]?.group||"","Research Topic":s.courses[courseKey]?.topic||""}));
  const ws=XLSX.utils.json_to_sheet(rows);
  ws["!cols"]=[{wch:4},{wch:28},{wch:20},{wch:28},{wch:8},{wch:40}];
  const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,course.label.slice(0,31));
  const suf=groupFilter&&groupFilter!=="all"?`_Grp${groupFilter}`:"";
  XLSX.writeFile(wb,`UCC_CoDE_${course.code.replace(/\//g,"-")}${suf}.xlsx`);
}

function exportAllXLSX(students) {
  const wb=XLSX.utils.book_new();
  const master=students.map((s,i)=>{ const r={"#":i+1,"Full Name":s.name,"Index Number":s.indexNumber||"","Programme":s.program||""}; COURSES.forEach(c=>{r[`${c.code} Group`]=s.courses?.[c.key]?.group||"";r[`${c.code} Topic`]=s.courses?.[c.key]?.topic||"";}); return r; });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(master),"All Students");
  COURSES.forEach(c=>{ const rows=[...students].filter(s=>s.courses?.[c.key]?.group).sort((a,b)=>a.courses[c.key].group.localeCompare(b.courses[c.key].group,undefined,{numeric:true})||a.name.localeCompare(b.name)).map((s,i)=>({"#":i+1,"Full Name":s.name,"Index Number":s.indexNumber||"","Programme":s.program||"","Group":s.courses[c.key]?.group||"","Research Topic":s.courses[c.key]?.topic||""})); if(rows.length)XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(rows),c.label.slice(0,31)); });
  XLSX.writeFile(wb,"UCC_CoDE_StudentDatabase.xlsx");
}

// ─────────────────────────────────────────────────────────────────────────────
// FIREBASE DATABASE LAYER
// ─────────────────────────────────────────────────────────────────────────────
function useStudents() {
  const [students,  setStudents]  = useState([]);
  const [loading,   setLoading]   = useState(true);
  const [saving,    setSaving]    = useState(false);
  const [dbMode,    setDbMode]    = useState("local"); // "firebase" | "local"

  useEffect(()=>{
    if(window.firebaseReady && window.db) {
      setDbMode("firebase");
      // Real-time listener
      const unsub = window.db.collection("students").onSnapshot(
        snap => {
          const docs = snap.docs.map(d=>({...d.data(), _docId:d.id}));
          setStudents(docs);
          setLoading(false);
        },
        err => {
          console.error("Firestore error:", err);
          // Fallback to local
          setStudents(lsGet());
          setLoading(false);
          setDbMode("local");
        }
      );
      return ()=>unsub();
    } else {
      setStudents(lsGet());
      setLoading(false);
    }
  },[]);

  const saveStudent = useCallback(async (student) => {
    setSaving(true);
    try {
      if(dbMode==="firebase" && window.db) {
        const {_docId,...data} = student;
        // Use student.id as document ID for consistent lookup
        await window.db.collection("students").doc(student.id).set(data);
        // Snapshot listener will update state automatically
      } else {
        setStudents(prev=>{
          const idx=prev.findIndex(x=>x.id===student.id);
          const next = idx>=0 ? [...prev.slice(0,idx),student,...prev.slice(idx+1)] : [...prev,student];
          lsSet(next); return next;
        });
      }
    } finally { setSaving(false); }
  }, [dbMode]);

  const deleteStudent = useCallback(async (id) => {
    setSaving(true);
    try {
      if(dbMode==="firebase" && window.db) {
        await window.db.collection("students").doc(id).delete();
      } else {
        setStudents(prev=>{ const next=prev.filter(s=>s.id!==id); lsSet(next); return next; });
      }
    } finally { setSaving(false); }
  }, [dbMode]);

  const importStudents = useCallback(async (list) => {
    if(!window.confirm(`Add ${list.length} students to the database?`)) return;
    setSaving(true);
    try {
      if(dbMode==="firebase" && window.db) {
        const batch = window.db.batch();
        list.forEach(s=>{ const ref=window.db.collection("students").doc(s.id); batch.set(ref,s); });
        await batch.commit();
      } else {
        setStudents(prev=>{ const next=[...prev,...list]; lsSet(next); return next; });
      }
    } finally { setSaving(false); }
  }, [dbMode]);

  return { students, loading, saving, dbMode, saveStudent, deleteStudent, importStudents };
}

function AdminPanel({students,onAdd,onEdit,onDelete,onImport}){
  const [search,setSearch]=useState("");
  const [sortBy,setSortBy]=useState("name");
  const [delConfirm,setDelConfirm]=useState(null);
  const fileRef=useRef();
  const filtered=useMemo(()=>{
    let l=[...students];
    if(search){const q=search.toLowerCase();l=l.filter(s=>s.name.toLowerCase().includes(q)||(s.indexNumber||"").toLowerCase().includes(q)||(s.program||"").toLowerCase().includes(q));}
    l.sort((a,b)=>a[sortBy==="name"?"name":"program"].localeCompare(b[sortBy==="name"?"name":"program"]));
    return l;
  },[students,search,sortBy]);
  const handleFile=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      const wb=XLSX.read(ev.target.result,{type:"binary"});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws);
      const list=rows.map(r=>{
        const s=emptyStudent();
        s.name=r["Full Name"]||r["Name"]||r["name"]||"";
        s.indexNumber=r["Index Number"]||r["Index"]||"";
        s.program=r["Programme"]||r["Program"]||"";
        COURSES.forEach(c=>{s.courses[c.key].group=r[`${c.code} Group`]||r[`${c.label} Group`]||"";s.courses[c.key].topic=r[`${c.code} Topic`]||r[`${c.label} Topic`]||"";});
        return s;
      }).filter(s=>s.name.trim());
      onImport(list);fileRef.current.value="";
    };
    reader.readAsBinaryString(file);
  };
  const handleSeed = async () => {
    const newOnes = SEED_STUDENTS.filter(s => !students.some(ex => ex.indexNumber === s.indexNumber));
    const skipped = SEED_STUDENTS.length - newOnes.length;
    if (newOnes.length === 0) { alert(`All ${skipped} students are already in the database. Nothing to load.`); return; }
    if (!window.confirm(`Load ${newOnes.length} students into Firebase?${skipped > 0 ? `\n(${skipped} already exist and will be skipped.)` : ""}`)) return;
    try {
      if (window.db) {
        // Firestore allows max 500 ops per batch — split into chunks
        const chunkSize = 400;
        for (let i = 0; i < newOnes.length; i += chunkSize) {
          const chunk = newOnes.slice(i, i + chunkSize);
          const batch = window.db.batch();
          chunk.forEach(s => { const ref = window.db.collection("students").doc(s.id); batch.set(ref, s); });
          await batch.commit();
        }
        alert(`✅ Done! ${newOnes.length} students loaded into Firebase.`);
      } else {
        // localStorage fallback
        onImport(newOnes);
      }
    } catch(err) {
      alert("Error seeding: " + err.message);
    }
  };

  return (
    <div>
      <div className="admin-top">
        <div><h1>Admin Dashboard</h1><p className="lead">{students.length} students in database</p></div>
        <div className="admin-btns">
          <button className="btn-import" onClick={()=>fileRef.current.click()}><ImportIco/> Import Excel</button>
          <input ref={fileRef} type="file" accept=".xlsx,.xls" style={{display:"none"}} onChange={handleFile}/>
          <button className="btn-excel" onClick={()=>exportAllXLSX(students)}><ExcelIco/> Export All</button>
          <button className="btn-add" onClick={onAdd}><PlusIco/> Add Student</button>
          <button className="btn-seed" onClick={handleSeed} title="Load all 220 students from all 7 courses">🌱 Seed Database</button>
        </div>
      </div>
      <div className="filter-bar">
        <div className="search-wrap">
          <SearchIco/>
          <input className="search-input" placeholder="Search students…" value={search} onChange={e=>setSearch(e.target.value)}/>
          {search&&<button className="x-small" onClick={()=>setSearch("")}>✕</button>}
        </div>
        <select className="sel" value={sortBy} onChange={e=>setSortBy(e.target.value)}>
          <option value="name">Sort: Name A–Z</option>
          <option value="program">Sort: Programme</option>
        </select>
      </div>
      <div className="tbl-wrap">
        <table>
          <thead><tr>
            <th>#</th><th>Full Name</th><th>Index No.</th><th>Programme</th>
            {COURSES.map(c=><th key={c.key} style={{fontSize:10}}>{c.code}</th>)}
            <th>Actions</th>
          </tr></thead>
          <tbody>
            {filtered.map((s,i)=>(
              <tr key={s.id} className={i%2===0?"even":""}>
                <td>{i+1}</td><td style={{fontWeight:600}}>{s.name}</td>
                <td>{s.indexNumber||<span className="dash">—</span>}</td>
                <td>{s.program||<span className="dash">—</span>}</td>
                {COURSES.map(c=>(
                  <td key={c.key}>{s.courses?.[c.key]?.group?<span className="grp-badge">Grp {s.courses[c.key].group}</span>:<span className="dash">—</span>}</td>
                ))}
                <td>
                  <div style={{display:"flex",gap:5}}>
                    <button className="btn-edit" onClick={()=>onEdit(s)} title="Edit"><EditIco/></button>
                    <button className="btn-del" onClick={()=>setDelConfirm(s.id)} title="Delete"><DelIco/></button>
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
        {filtered.length===0&&<div className="empty">No students found.</div>}
      </div>
      {delConfirm&&(
        <div className="overlay" onClick={e=>e.target===e.currentTarget&&setDelConfirm(null)}>
          <div className="modal" style={{maxWidth:380,padding:32,display:"flex",flexDirection:"column",gap:16}}>
            <h3 style={{color:"var(--navy)",margin:0}}>Delete Student?</h3>
            <p style={{color:"#555",margin:0,fontSize:14}}>Permanently remove <b>{students.find(s=>s.id===delConfirm)?.name}</b>? This cannot be undone.</p>
            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
              <button className="btn-cancel" onClick={()=>setDelConfirm(null)}>Cancel</button>
              <button className="btn-save" style={{background:"var(--red)",width:"auto"}} onClick={()=>{onDelete(delConfirm);setDelConfirm(null);}}>Delete</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

  const {students,loading,saving,dbMode,saveStudent,deleteStudent,importStudents} = useStudents();
  const [view,setView]=useState("portal");
  const [authed,setAuthed]=useState(false);
  const [pw,setPw]=useState("");
  const [pwErr,setPwErr]=useState("");
  const [modal,setModal]=useState(null);
  const [search,setSearch]=useState("");
  const [progFilter,setProgFilter]=useState("all");

  const handleSave=useCallback(async s=>{await saveStudent(s);setModal(null);},[saveStudent]);
  const handleLogin=()=>{ if(pw===ADMIN_PASSWORD){setAuthed(true);setPwErr("");setView("admin");setPw("");}else setPwErr("Incorrect password."); };

  const portalList=useMemo(()=>{
    let l=[...students];
    if(search){const q=search.toLowerCase();l=l.filter(s=>s.name.toLowerCase().includes(q)||(s.indexNumber||"").toLowerCase().includes(q)||Object.values(s.courses||{}).some(c=>(c.group||"").toLowerCase().includes(q)||(c.topic||"").toLowerCase().includes(q)));}
    if(progFilter!=="all")l=l.filter(s=>s.program===progFilter);
    return l.sort((a,b)=>a.name.localeCompare(b.name));
  },[students,search,progFilter]);

  if(loading) return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",background:"#0d1b2a",gap:16}}>
      <div style={{color:"#f0a500",fontSize:24,fontFamily:"Georgia,serif",fontWeight:700}}>UCC CoDE</div>
      <div style={{color:"#8899bb",fontSize:14,fontFamily:"Arial,sans-serif"}}>Loading Student Database…</div>
      <div style={{width:40,height:40,border:"3px solid #ffffff22",borderTopColor:"#1b6ca8",borderRadius:"50%",animation:"spin .6s linear infinite"}}></div>
    </div>
  );

  return (
    <React.Fragment>
      <header className="hdr">
        <div className="hdr-inner">
          <div className="logo">
            <div className="logo-mk">UCC</div>
            <div>
              <div className="logo-title">CoDE Student Database</div>
              <div className="logo-sub">BSc IT &amp; BEd IT · Group &amp; Assignment Tracker</div>
            </div>
          </div>
          <nav>
            {[["portal","🎓 Student Portal"],["courses","📚 Course Views"],[authed?"admin":"login",authed?"🔓 Admin":"🔒 Admin"]].map(([v,l])=>(
              <button key={v} className={"nav-btn"+(view===v?" on":"")} onClick={()=>{if(v==="admin"&&!authed)setView("login");else setView(v);}}>{l}</button>
            ))}
            {authed&&<button className="logout-btn" onClick={()=>{setAuthed(false);setView("portal");}}>Sign Out</button>}
          </nav>
        </div>
        <div className="stripe"/>
      </header>

      <main>
        {/* CONFIG NOTICE when Firebase not set up */}
        {!window.firebaseReady && (
          <div className="config-notice">
            <h3>⚠️ Firebase Not Configured — Running in Local Mode</h3>
            <p>Data is currently saving to this browser only. To enable the cloud database (so all classmates can see updates), open <code>index.html</code> in a text editor, find the <code>firebaseConfig</code> section, and replace the placeholder values with your Firebase project credentials.</p>
            <p style={{marginTop:8}}>See setup instructions at the top of the HTML file, or ask your IT admin (JB IT Solutions) to configure it.</p>
          </div>
        )}

        {view==="portal" && (
          <div>
            <div style={{marginBottom:24}}><h1>Student Groups &amp; Assignments</h1><p className="lead">Find your name, group number, and research topic for each course. Click a card to expand.</p></div>
            <div className="filter-bar">
              <div className="search-wrap">
                <SearchIco/>
                <input className="search-input" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search by name, group, topic…"/>
                {search&&<button className="x-small" onClick={()=>setSearch("")}>✕</button>}
              </div>
              <select className="sel" value={progFilter} onChange={e=>setProgFilter(e.target.value)}>
                <option value="all">All Programmes</option>
                {PROGRAMS.map(p=><option key={p}>{p}</option>)}
              </select>
            </div>
            <p className="stat"><b>{portalList.length}</b> of <b>{students.length}</b> students shown</p>
            {portalList.length===0?<div className="empty">No students match your search.</div>:<div className="card-grid">{portalList.map(s=><StudentCard key={s.id} student={s}/>)}</div>}
          </div>
        )}

        {view==="courses" && <CourseView students={students}/>}

        {view==="login" && (
          <div className="login-wrap">
            <div className="login-card">
              <div style={{textAlign:"center",color:"var(--teal)",marginBottom:4}}><LockIco s={22}/></div>
              <h2 style={{margin:0,textAlign:"center",color:"var(--navy)",fontSize:20}}>Admin Access</h2>
              <p className="lead" style={{textAlign:"center"}}>Enter the administrator password.</p>
              <input type="password" className="inp" placeholder="Password" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleLogin()}/>
              {pwErr&&<p className="err">{pwErr}</p>}
              <button className="btn-save" style={{width:"100%"}} onClick={handleLogin}>Unlock Admin Panel →</button>
            </div>
          </div>
        )}

        {view==="admin" && authed && (
          <AdminPanel
            students={students}
            onAdd={()=>setModal(emptyStudent())}
            onEdit={s=>setModal(JSON.parse(JSON.stringify(s)))}
            onDelete={deleteStudent}
            onImport={importStudents}
          />
        )}
      </main>

      {modal && <StudentModal student={modal} onSave={handleSave} onClose={()=>setModal(null)}/>}

      {saving && (
        <div className="saving-toast">
          <span className="spinner"/>
          Saving to {window.firebaseReady?"Firebase cloud":"local storage"}…
        </div>
      )}

      <footer>
        UCC CoDE Student Group Database &nbsp;·&nbsp; BSc IT &amp; BEd IT &nbsp;·&nbsp; JB IT Solutions &nbsp;·&nbsp; {new Date().getFullYear()}
        &nbsp;·&nbsp; <span style={{color:window.firebaseReady?"var(--green)":"#f0a500"}}>{window.firebaseReady?"● Firebase Cloud Active":"● Local Mode (Firebase not configured)"}</span>
      </footer>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

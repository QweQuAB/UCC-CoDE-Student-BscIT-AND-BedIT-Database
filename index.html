                    :<span className="badge-warn">○ Hidden</span>}
                  </td>
                  <td style={{textAlign:"center"}}>{n.pinned?"📌":"—"}</td>
                  <td style={{fontSize:11,color:"var(--sub)",fontFamily:"Arial,sans-serif"}}>{n.createdAt?new Date(n.createdAt).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"}):""}</td>
                  <td>
                    <div style={{display:"flex",gap:6}}>
                      <button className="btn-edit" onClick={()=>setForm({...n})}>✏️</button>
                      <button className="btn-edit" style={{background:n.active!==false?"#fff3cd":"#e8f7ee"}} title={n.active!==false?"Hide from portal":"Show in portal"}
                        onClick={()=>onSave({...n,active:!n.active})}>{n.active!==false?"🙈":"👁️"}</button>
                      {del===n.id
                        ?<React.Fragment>
                            <button className="btn-del" onClick={()=>{onDelete(n.id);setDel(null);}}>Confirm</button>
                            <button className="btn-cancel" style={{padding:"4px 8px",fontSize:12}} onClick={()=>setDel(null)}>Cancel</button>
                          </React.Fragment>
                        :<button className="btn-del" onClick={()=>setDel(n.id)}>🗑️</button>
                      }
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table></div>
      }
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// ADMIN PANEL
// ─────────────────────────────────────────────────────────────────────────────
function AdminPanel({students,onAdd,onEdit,onDelete,onImport,onSaveStudent,onSaveGroupTopic,settings,onSaveSettings,adminPassword,onPasswordChange,onDeleteAll,cfg,onSaveCfg,onSaveMeta,onSaveWaLinks,notices,onSaveNotice,onDeleteNotice}){
  const [adminTab,setAdminTab] = useState("dashboard");
  const [search,setSearch]=useState("");
  const [sortBy,setSortBy]=useState("name");
  const [delConfirm,setDelConfirm]=useState(null);
  const fileRef=useRef();
  const filtered=useMemo(()=>{
    let l=[...students];
    if(search){const q=search.toLowerCase();l=l.filter(s=>s.name.toLowerCase().includes(q)||(s.indexNumber||"").toLowerCase().includes(q)||(s.program||"").toLowerCase().includes(q));}
    l.sort((a,b)=>a[sortBy==="name"?"name":"program"].localeCompare(b[sortBy==="name"?"name":"program"]));
    return l;
  },[students,search,sortBy]);

  const handleFile=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      const wb=XLSX.read(ev.target.result,{type:"binary"});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws);
      const list=rows.map(r=>{
        const s=emptyStudent();
        s.name=r["Full Name"]||r["Name"]||r["name"]||"";
        s.indexNumber=r["Index Number"]||r["Index"]||"";
        s.program=r["Programme"]||r["Program"]||"";
        COURSES.forEach(c=>{s.courses[c.key].group=r[`${c.code} Group`]||r[`${c.label} Group`]||"";s.courses[c.key].topic=r[`${c.code} Topic`]||r[`${c.label} Topic`]||"";});
        return s;
      }).filter(s=>s.name.trim());
      onImport(list);fileRef.current.value="";
    };
    reader.readAsBinaryString(file);
  };

  const handleSeed = async () => {
    const newOnes = SEED_STUDENTS.filter(s => !students.some(ex => ex.indexNumber === s.indexNumber));
    const skipped = SEED_STUDENTS.length - newOnes.length;
    if (newOnes.length === 0) { alert(`All ${skipped} students are already in the database. Nothing to load.`); return; }
    if (!window.confirm(`Load ${newOnes.length} students into Firebase?${skipped > 0 ? `\n(${skipped} already exist and will be skipped.)` : ""}`)) return;
    try {
      if (window.db) {
        const chunkSize = 400;
        for (let i = 0; i < newOnes.length; i += chunkSize) {
          const chunk = newOnes.slice(i, i + chunkSize);
          const batch = window.db.batch();
          chunk.forEach(s => { const ref = window.db.collection("students").doc(s.id); batch.set(ref, s); });
          await batch.commit();
        }
        alert(`✅ Done! ${newOnes.length} students loaded into Firebase.`);
      } else { onImport(newOnes); }
    } catch(err) { alert("Error seeding: " + err.message); }
  };

  const TABS = [
    ["dashboard","📊 Dashboard"],
    ["students","👥 Students"],
    ["groups","📚 Groups"],
    ["wizard","🧙 Wizard"],
    ["notices","📋 Notices"],
    ["settings","⚙️ Settings"],
  ];

  return (
    <div>
      <div className="admin-inner-tabs">
        {TABS.map(([k,l])=>(
          <button key={k} className={"ai-tab"+(adminTab===k?" on":"")} onClick={()=>setAdminTab(k)}>
            {l}{k==="notices"&&notices.filter(n=>n.active!==false).length>0&&<span className="nb-count-badge">{notices.filter(n=>n.active!==false).length}</span>}
          </button>
        ))}
      </div>

      {adminTab==="dashboard"&&<AdminDashboard students={students}/>}

      {adminTab==="students"&&(
        <div>
          <div className="admin-top">
            <div><h1>Student Management</h1><p className="lead">{students.length} students in database</p></div>
            <div className="admin-btns">
              <button className="btn-import" onClick={()=>fileRef.current.click()}><ImportIco/> Import Excel</button>
              <input ref={fileRef} type="file" accept=".xlsx,.xls" style={{display:"none"}} onChange={handleFile}/>
              <button className="btn-excel" onClick={()=>exportAllXLSX(students)}><ExcelIco/> Export All</button>
              <button className="btn-add" onClick={onAdd}><PlusIco/> Add Student</button>
              <button className="btn-seed" onClick={handleSeed} title="Load all 218 students from source PDFs">🌱 Seed Database</button>
            </div>
          </div>
          <div className="filter-bar">
            <div className="search-wrap">
              <SearchIco/>
              <input className="search-input" placeholder="Search students…" value={search} onChange={e=>setSearch(e.target.value)}/>
              {search&&<button className="x-small" onClick={()=>setSearch("")}>✕</button>}
            </div>
            <select className="sel" value={sortBy} onChange={e=>setSortBy(e.target.value)}>
              <option value="name">Sort: Name A–Z</option>
              <option value="program">Sort: Programme</option>
            </select>
          </div>
          <p className="stat">{filtered.length} of {students.length} students</p>
          {students.length===0?<div className="empty">No students yet — click "Add Student" or "Seed Database".</div>:(
            <div className="tbl-wrap">
              <table>
                <thead><tr><th>#</th><th>Name</th><th>Index Number</th><th>Programme</th><th>Groups</th><th>Actions</th></tr></thead>
                <tbody>
                  {filtered.map((s,i)=>(
                    <tr key={s.id} className={i%2===0?"even":""}>
                      <td style={{color:"var(--sub)",fontSize:11}}>{i+1}</td>
                      <td style={{fontWeight:600}}>{s.name}</td>
                      <td style={{fontFamily:"monospace",fontSize:12}}>{s.indexNumber||<span className="dash">—</span>}</td>
                      <td style={{fontSize:12}}>{s.program||<span className="dash">—</span>}</td>
                      <td>
                        <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                          {COURSES.filter(c=>s.courses[c.key]?.group).map(c=>(
                            <span key={c.key} className="grp-badge" title={c.label}>{c.code} G{s.courses[c.key].group}</span>
                          ))}
                          {COURSES.filter(c=>s.courses[c.key]?.group).length===0&&<span className="dash">—</span>}
                        </div>
                      </td>
                      <td>
                        <div style={{display:"flex",gap:6}}>
                          <button className="btn-edit" onClick={()=>onEdit(s)}>✏️</button>
                          {delConfirm===s.id
                            ?<React.Fragment><button className="btn-del" onClick={()=>{onDelete(s.id);setDelConfirm(null);}}>Confirm</button><button className="btn-cancel" style={{padding:"4px 8px",fontSize:12}} onClick={()=>setDelConfirm(null)}>Cancel</button></React.Fragment>
                            :<button className="btn-del" onClick={()=>setDelConfirm(s.id)}>🗑️</button>
                          }
                        </div>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </div>
      )}

      {adminTab==="groups"&&<GroupsManager students={students} onSaveGroupTopic={onSaveGroupTopic} onSaveStudent={onSaveStudent}/>}
      {adminTab==="wizard"&&<WizardPanel students={students} onSaveGroupTopic={onSaveGroupTopic} onSaveStudent={onSaveStudent}/>}
      {adminTab==="notices"&&<NoticesAdmin notices={notices||[]} onSave={onSaveNotice} onDelete={onDeleteNotice}/>}
            {adminTab==="settings"&&<SettingsPanel settings={settings} onSaveSettings={onSaveSettings} adminPassword={adminPassword} onPasswordChange={onPasswordChange} students={students} onDeleteAll={onDeleteAll} cfg={cfg} onSaveCfg={onSaveCfg}/>}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// APP
// ─────────────────────────────────────────────────────────────────────────────
function App(){
  const {students,loading,saving,dbMode,saveStudent,deleteStudent,importStudents,saveGroupTopic} = useStudents();
  const {notices, loading: noticesLoading, saveNotice, deleteNotice} = useNotices();
  const appCfg = useAppConfig();
  const activeCourses = appCfg.cfg.courses || COURSES;
  const activePrograms = appCfg.cfg.programs || PROGRAMS;
  const [view,setView]=useState("portal");
  const [authed,setAuthed]=useState(false);
  const [pw,setPw]=useState("");
  const [pwErr,setPwErr]=useState("");
  const [modal,setModal]=useState(null);
  const [search,setSearch]=useState("");
  const [progFilter,setProgFilter]=useState("all");
  const [courseNav,setCourseNav]=useState(null);

  // Dynamic admin password (stored in localStorage)
  const [adminPassword,setAdminPassword] = useState(()=>localStorage.getItem("admin_pw")||"StAnne2025");

  // Portal appearance settings
  const DEFAULT_SETTINGS = {portalTitle:"UCC CoDE",portalSub:"BSc IT \u0026 BEd IT \u00b7 Group \u0026 Assignment Tracker",accentColor:"#1b6ca8",goldColor:"#f0a500",navyColor:"#0d1b2a"};
  const [portalSettings,setPortalSettings] = useState(()=>{
    try{const s=localStorage.getItem("portal_cfg");return s?{...DEFAULT_SETTINGS,...JSON.parse(s)}:DEFAULT_SETTINGS;}
    catch{return DEFAULT_SETTINGS;}
  });

  const handleSaveMeta = (meta) => {
    _displayMeta = meta;
    localStorage.setItem("display_meta", JSON.stringify(meta));
  };
  const handleSaveWaLinks = (wa) => {
    _waLinks = wa;
    localStorage.setItem("wa_links", JSON.stringify(wa));
  };

  const applySettings = useCallback((s)=>{
    document.documentElement.style.setProperty("--teal",s.accentColor||"#1b6ca8");
    document.documentElement.style.setProperty("--gold",s.goldColor||"#f0a500");
    document.documentElement.style.setProperty("--navy",s.navyColor||"#0d1b2a");
  },[]);

  useEffect(()=>applySettings(portalSettings),[portalSettings]);

  const handleSaveSettings = (s)=>{
    setPortalSettings(s);
    localStorage.setItem("portal_cfg",JSON.stringify(s));
    applySettings(s);
  };
  const handlePasswordChange = (p)=>{setAdminPassword(p);localStorage.setItem("admin_pw",p);};
  const handleDeleteAll = useCallback(async ()=>{
    if(window.db){
      const snap=await window.db.collection("students").get();
      const batch=window.db.batch();
      snap.docs.forEach(d=>batch.delete(d.ref));
      await batch.commit();
    } else { localStorage.removeItem("students_db"); }
  },[]);

  const handleSave=useCallback(async s=>{await saveStudent(s);setModal(null);},[saveStudent]);
  const handleLogin=()=>{ if(pw===adminPassword){setAuthed(true);setPwErr("");setView("admin");setPw("");}else setPwErr("Incorrect password."); };

  const portalList=useMemo(()=>{
    let l=[...students];
    if(search){const q=search.toLowerCase();l=l.filter(s=>s.name.toLowerCase().includes(q)||(s.indexNumber||"").toLowerCase().includes(q)||Object.values(s.courses||{}).some(c=>(c.group||"").toLowerCase().includes(q)||(c.topic||"").toLowerCase().includes(q)));}
    if(progFilter!=="all")l=l.filter(s=>s.program===progFilter);
    return l.sort((a,b)=>a.name.localeCompare(b.name));
  },[students,search,progFilter]);

  if(loading) return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",background:"#0d1b2a",gap:16}}>
      <div style={{color:"#f0a500",fontSize:24,fontFamily:"Georgia,serif",fontWeight:700}}>UCC CoDE</div>
      <div style={{color:"#8899bb",fontSize:14,fontFamily:"Arial,sans-serif"}}>Loading Student Database…</div>
      <div style={{width:40,height:40,border:"3px solid #ffffff22",borderTopColor:"#1b6ca8",borderRadius:"50%",animation:"spin .6s linear infinite"}}></div>
    </div>
  );

  return (
    <React.Fragment>
      <header className="hdr">
        <div className="hdr-inner">
          <div className="logo">
            <div className="logo-mk">{(portalSettings.portalTitle||"UCC").substring(0,3).toUpperCase()}</div>
            <div>
              <div className="logo-title">{portalSettings.portalTitle||"UCC CoDE"}</div>
              <div className="logo-sub">{portalSettings.portalSub||"BSc IT & BEd IT · Group & Assignment Tracker"}</div>
            </div>
          </div>
          <nav>
            {[["portal","🎓 Student Portal"],["noticeboard","📋 Noticeboard"],["courses","📚 Course Views"],[authed?"admin":"login",authed?"🔓 Admin":"🔒 Admin"]].map(([v,l])=>(
              <button key={v} className={"nav-btn"+(view===v?" on":"")} onClick={()=>{if(v==="admin"&&!authed)setView("login");else setView(v);}}>{l}</button>
            ))}
            {authed&&<button className="logout-btn" onClick={()=>{setAuthed(false);setView("portal");}}>Sign Out</button>}
          </nav>
        </div>
        <div className="stripe"/>
      </header>

      <main>
        {!window.firebaseReady && (
          <div className="config-notice">
            <h3>\u26a0\ufe0f Firebase Not Configured \u2014 Running in Local Mode</h3>
            <p>Data is currently saving to this browser only. To enable the cloud database (so all classmates can see updates), open <code>index.html</code> in a text editor, find the <code>firebaseConfig</code> section, and replace the placeholder values with your Firebase project credentials.</p>
            <p style={{marginTop:8}}>See setup instructions at the top of the HTML file, or ask your IT admin (JB IT Solutions) to configure it.</p>
          </div>
        )}

        {view==="portal" && (
          <div>
            <div style={{marginBottom:24}}><h1>Student Groups &amp; Assignments</h1><p className="lead">Find your name, group number, and research topic for each course. Click a card to expand.</p></div>
            {(()=>{const reps=portalList.filter(s=>s.role?.type);return reps.length>0&&(
              <div className="reps-section">
                <div className="reps-section-hdr">
                  <h2>★ Leadership</h2>
                  <span className="badge">{reps.length} representative{reps.length!==1?"s":""}</span>
                </div>
                <div className="reps-grid">
                  {reps.map(s=><RepCard key={s.id} student={s} onViewCourse={(key,grp)=>{setCourseNav({courseKey:key,group:grp});setView("courses");}}/>)}
                </div>
              </div>
            )})()}
            <RepBoard students={students} courses={activeCourses} whatsapp={appCfg.cfg.whatsapp}
              onNavCourse={ck=>{ setCourseNav(ck); setView("courses"); }}
              onNavProg={pg=>{ setProgFilter(pg||"all"); }}
            />
            <div className="filter-bar">
              <div className="search-wrap">
                <SearchIco/>
                <input className="search-input" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search by name, group, topic\u2026"/>
                {search&&<button className="x-small" onClick={()=>setSearch("")}>\u2715</button>}
              </div>
              <select className="sel" value={progFilter} onChange={e=>setProgFilter(e.target.value)}>
                <option value="all">All Programmes</option>
                {activePrograms.map(p=><option key={p}>{p}</option>)}
              </select>
            </div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
              <p className="stat" style={{margin:0}}><b>{portalList.length}</b> of <b>{students.length}</b> students shown</p>
              {progFilter!=="all"&&appCfg.cfg.whatsapp?.programs?.[progFilter]&&(
                <a href={appCfg.cfg.whatsapp.programs[progFilter]} target="_blank" rel="noopener noreferrer" className="wa-btn">💬 {progFilter.replace("BSc ","").replace("Certificate in ","Cert. ").replace("BEd ","")} WhatsApp</a>
              )}
            </div>
            {portalList.length===0?<div className="empty">No students match your search.</div>:<div className="card-grid">{portalList.map(s=><StudentCard key={s.id} student={s} whatsapp={appCfg.cfg.whatsapp}/>)}</div>}
          </div>
        )}

        {view==="courses" && <CourseView students={students} whatsapp={appCfg.cfg.whatsapp} courses={activeCourses} initialCourse={courseNav}/>}

        {view==="noticeboard" && <Noticeboard notices={notices} loading={noticesLoading}/>}

        {view==="login" && (
          <div className="login-wrap">
            <div className="login-card">
              <div style={{textAlign:"center",color:"var(--teal)",marginBottom:4}}><LockIco s={22}/></div>
              <h2 style={{margin:0,textAlign:"center",color:"var(--navy)",fontSize:20}}>Admin Access</h2>
              <p className="lead" style={{textAlign:"center"}}>Enter the administrator password.</p>
              <input type="password" className="inp" placeholder="Password" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleLogin()}/>
              {pwErr&&<p className="err">{pwErr}</p>}
              <button className="btn-save" style={{width:"100%"}} onClick={handleLogin}>Unlock Admin Panel \u2192</button>
            </div>
          </div>
        )}

        {view==="admin" && authed && (
          <AdminPanel
            students={students}
            onAdd={()=>setModal(emptyStudent())}
            onEdit={s=>setModal(JSON.parse(JSON.stringify(s)))}
            onDelete={deleteStudent}
            onImport={importStudents}
            onSaveStudent={saveStudent}
            onSaveGroupTopic={saveGroupTopic}
            settings={portalSettings}
            onSaveSettings={handleSaveSettings}
            adminPassword={adminPassword}
            onPasswordChange={handlePasswordChange}
            onDeleteAll={handleDeleteAll}
            cfg={appCfg.cfg}
            onSaveCfg={appCfg.saveCfg}
            onSaveMeta={handleSaveMeta}
            onSaveWaLinks={handleSaveWaLinks}
            notices={notices}
            onSaveNotice={saveNotice}
            onDeleteNotice={deleteNotice}
          />
        )}
      </main>

      {modal && <StudentModal student={modal} onSave={handleSave} onClose={()=>setModal(null)} courses={appCfg.cfg.courses||COURSES}/>}

      {saving && (
        <div className="saving-toast">
          <span className="spinner"/>
          Saving to {window.firebaseReady?"Firebase cloud":"local storage"}\u2026
        </div>
      )}

      <footer>
        UCC CoDE Student Group Database \u00a0\u00b7\u00a0 BSc IT &amp; BEd IT \u00a0\u00b7\u00a0 JB IT Solutions \u00a0\u00b7\u00a0 {new Date().getFullYear()}
        \u00a0\u00b7\u00a0 <span style={{color:window.firebaseReady?"var(--green)":"#f0a500"}}>{window.firebaseReady?"\u25cf Firebase Cloud Active":"\u25cf Local Mode (Firebase not configured)"}</span>
      </footer>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
